<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOYAGER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ==========================================
//  VOYAGER - Space Exploration Game
// ==========================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth || document.documentElement.clientWidth || 1280;
    H = canvas.height = window.innerHeight || document.documentElement.clientHeight || 720;
}
window.addEventListener('resize', resize);

// ==========================================
//  CONFIGURATION
// ==========================================
const G = 800;
const MAX_PARTICLES = 800;
const FUEL_MAX = 100;
const ORBIT_THRUST = 180;
const LANDING_THRUST = 300;
const FUEL_BURN_RATE = 2.5;
const TRAIL_LENGTH = 120;
const PREDICTION_STEPS = 300;

const DIFFICULTY_PRESETS = {
    easy:   { fuelMax: 150, gravityMult: 0.7, planetCount: [4,5], orbitSpeedMult: 0.6, crashThreshold: 140, asteroidBelt: false, moonsEnabled: false, maxMoonsPerPlanet: 0, asteroidCount: 0, orbitMode: 'slow' },
    normal: { fuelMax: 100, gravityMult: 1.0, planetCount: [6,8], orbitSpeedMult: 1.0, crashThreshold: 100, asteroidBelt: false, moonsEnabled: true,  maxMoonsPerPlanet: 1, asteroidCount: 0, orbitMode: 'normal' },
    hard:   { fuelMax: 70,  gravityMult: 1.4, planetCount: [8,10], orbitSpeedMult: 1.4, crashThreshold: 70,  asteroidBelt: true,  moonsEnabled: true,  maxMoonsPerPlanet: 2, asteroidCount: 80, orbitMode: 'fast' }
};
let gameSettings = { ...DIFFICULTY_PRESETS.normal };

const PLANET_TYPES = [
    { name: 'Rocky',    baseH: 25,  baseS: 50,  baseL: 35, atmosphere: 0.2,  gravity: 1.0,  skyColor: [40, 15, 10],    atmoColor: '#CC884430' },
    { name: 'Ice',      baseH: 200, baseS: 40,  baseL: 70, atmosphere: 0.3,  gravity: 0.5,  skyColor: [15, 25, 45],    atmoColor: '#88CCEE40' },
    { name: 'Volcanic', baseH: 5,   baseS: 80,  baseL: 20, atmosphere: 0.4,  gravity: 1.3,  skyColor: [30, 5, 0],      atmoColor: '#FF440040' },
    { name: 'Lush',     baseH: 130, baseS: 50,  baseL: 40, atmosphere: 0.7,  gravity: 1.0,  skyColor: [100, 160, 220], atmoColor: '#4488CC50' },
    { name: 'Gas',      baseH: 30,  baseS: 55,  baseL: 55, atmosphere: 1.0,  gravity: 3.0,  skyColor: null,            atmoColor: '#DDAA6660' },
    { name: 'Barren',   baseH: 0,   baseS: 0,   baseL: 50, atmosphere: 0.0,  gravity: 0.3,  skyColor: [0, 0, 0],       atmoColor: null }
];

const SYLLABLES = ['or','an','el','is','ax','um','en','ar','ix','os','al','ur','ek','on','im','at','us','ep','ol','yn',
                   'tha','rin','ven','cor','tal','nis','kel','dra','pha','zor','mol','tex','cri','bel','jun'];

// ==========================================
//  MATH UTILITIES
// ==========================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
function angle(x1, y1, x2, y2) { return Math.atan2(y2-y1, x2-x1); }
function remap(v, a, b, c, d) { return c + (v - a) / (b - a) * (d - c); }
function smoothstep(t) { return t * t * (3 - 2 * t); }
function wrapX(x, circ) { return ((x % circ) + circ) % circ; }
function wrappedDelta(from, to, circ) {
    let d = to - from;
    if (d > circ / 2) d -= circ;
    if (d < -circ / 2) d += circ;
    return d;
}

// ==========================================
//  SEEDED RANDOM & NOISE
// ==========================================
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

let _noiseSeed = 0;
function hashN(n) {
    let s = n * 747796405 + 2891336453 | 0;
    s = ((s >> 16) ^ s) * -1028477379 | 0;
    s = ((s >> 16) ^ s) * 668265263 | 0;
    return ((s >> 16) ^ s) / 2147483648;
}

function noise1D(x) {
    const i = Math.floor(x);
    const f = x - i;
    const u = f * f * (3 - 2 * f);
    return lerp(hashN(i + _noiseSeed), hashN(i + 1 + _noiseSeed), u);
}

function noise2D(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const ux = fx * fx * (3 - 2 * fx);
    const uy = fy * fy * (3 - 2 * fy);
    const a = hashN(ix + iy * 7919 + _noiseSeed);
    const b = hashN(ix + 1 + iy * 7919 + _noiseSeed);
    const c = hashN(ix + (iy + 1) * 7919 + _noiseSeed);
    const d = hashN(ix + 1 + (iy + 1) * 7919 + _noiseSeed);
    return lerp(lerp(a, b, ux), lerp(c, d, ux), uy);
}

function fbm(x, octaves, seed) {
    _noiseSeed = seed;
    let val = 0, amp = 0.5, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) {
        val += noise1D(x * freq) * amp;
        max += amp;
        amp *= 0.5;
        freq *= 2.1;
    }
    return val / max;
}

function fbm2D(x, y, octaves, seed) {
    _noiseSeed = seed;
    let val = 0, amp = 0.5, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) {
        val += noise2D(x * freq, y * freq) * amp;
        max += amp;
        amp *= 0.5;
        freq *= 2.0;
    }
    return val / max;
}

// ==========================================
//  NAME GENERATOR
// ==========================================
function generateName(seed) {
    const rng = mulberry32(seed);
    const count = 2 + Math.floor(rng() * 2);
    let name = '';
    for (let i = 0; i < count; i++) {
        name += SYLLABLES[Math.floor(rng() * SYLLABLES.length)];
    }
    return name.charAt(0).toUpperCase() + name.slice(1);
}

// ==========================================
//  PARTICLE SYSTEM
// ==========================================
const particles = [];

function emitParticle(x, y, vx, vy, life, size, r, g, b) {
    if (particles.length >= MAX_PARTICLES) {
        const oldest = particles.reduce((min, p, i) => p.life < particles[min].life ? i : min, 0);
        const p = particles[oldest];
        p.x = x; p.y = y; p.vx = vx; p.vy = vy;
        p.life = p.maxLife = life; p.size = size;
        p.r = r; p.g = g; p.b = b;
        return;
    }
    particles.push({ x, y, vx, vy, life, maxLife: life, size, r, g, b });
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function renderParticles(camX, camY, zoom) {
    for (const p of particles) {
        const a = clamp(p.life / p.maxLife, 0, 1);
        const sx = (p.x - camX) * zoom + W / 2;
        const sy = (p.y - camY) * zoom + H / 2;
        const sr = p.size * zoom * a;
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
        ctx.globalAlpha = a * 0.9;
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(sr, 0.5), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function renderParticlesScreen() {
    for (const p of particles) {
        const a = clamp(p.life / p.maxLife, 0, 1);
        if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) continue;
        ctx.globalAlpha = a * 0.9;
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(p.size * a, 0.5), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ==========================================
//  AUDIO ENGINE (Web Audio API)
// ==========================================
let audioCtx = null;
let masterGain = null;
let thrustOsc = null;
let thrustGain = null;
let ambientOsc = null;
let ambientGain = null;

function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;
        masterGain.connect(audioCtx.destination);

        // Thrust sound
        thrustOsc = audioCtx.createOscillator();
        thrustOsc.type = 'sawtooth';
        thrustOsc.frequency.value = 80;
        thrustGain = audioCtx.createGain();
        thrustGain.gain.value = 0;
        const thrustFilter = audioCtx.createBiquadFilter();
        thrustFilter.type = 'lowpass';
        thrustFilter.frequency.value = 300;
        thrustOsc.connect(thrustFilter);
        thrustFilter.connect(thrustGain);
        thrustGain.connect(masterGain);
        thrustOsc.start();

        // Ambient drone
        ambientOsc = audioCtx.createOscillator();
        ambientOsc.type = 'sine';
        ambientOsc.frequency.value = 55;
        ambientGain = audioCtx.createGain();
        ambientGain.gain.value = 0.05;
        const ambientFilter = audioCtx.createBiquadFilter();
        ambientFilter.type = 'lowpass';
        ambientFilter.frequency.value = 100;
        ambientOsc.connect(ambientFilter);
        ambientFilter.connect(ambientGain);
        ambientGain.connect(masterGain);
        ambientOsc.start();
    } catch(e) {}
}

function playSound(freq, duration, type, vol) {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type || 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol || 0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function setThrustSound(active) {
    if (!thrustGain) return;
    const t = audioCtx.currentTime;
    thrustGain.gain.cancelScheduledValues(t);
    thrustGain.gain.setTargetAtTime(active ? 0.15 : 0, t, 0.05);
    if (thrustOsc) thrustOsc.frequency.setTargetAtTime(active ? 80 + Math.random() * 20 : 80, t, 0.1);
}

// ==========================================
//  INPUT SYSTEM
// ==========================================
const keys = {};
const keysJustPressed = {};
window.addEventListener('keydown', e => {
    if (!keys[e.code]) keysJustPressed[e.code] = true;
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab','KeyE'].includes(e.code)) {
        e.preventDefault();
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let scrollDelta = 0;
window.addEventListener('wheel', e => { scrollDelta += e.deltaY; e.preventDefault(); }, { passive: false });

function clearJustPressed() {
    for (const k in keysJustPressed) delete keysJustPressed[k];
    scrollDelta = 0;
}

function isKey(code) { return keys[code]; }
function justPressed(code) { return keysJustPressed[code]; }
function thrustKey() { return isKey('KeyW') || isKey('ArrowUp'); }
function leftKey() { return isKey('KeyA') || isKey('ArrowLeft'); }
function rightKey() { return isKey('KeyD') || isKey('ArrowRight'); }
function brakeKey() { return isKey('KeyS') || isKey('ArrowDown'); }
function interactKey() { return justPressed('KeyE'); }

// ==========================================
//  CAMERA
// ==========================================
const camera = { x: 0, y: 0, zoom: 0.5, targetZoom: 0.5, shake: 0 };

function updateCamera(targetX, targetY, dt) {
    camera.x = lerp(camera.x, targetX, 1 - Math.exp(-5 * dt));
    camera.y = lerp(camera.y, targetY, 1 - Math.exp(-5 * dt));

    if (scrollDelta !== 0) {
        camera.targetZoom *= scrollDelta > 0 ? 0.9 : 1.1;
        camera.targetZoom = clamp(camera.targetZoom, 0.05, 3.0);
    }
    camera.zoom = lerp(camera.zoom, camera.targetZoom, 1 - Math.exp(-6 * dt));
    camera.shake *= Math.exp(-8 * dt);
}

function worldToScreen(wx, wy) {
    let sx = (wx - camera.x) * camera.zoom + W / 2;
    let sy = (wy - camera.y) * camera.zoom + H / 2;
    if (camera.shake > 0.5) {
        sx += (Math.random() - 0.5) * camera.shake;
        sy += (Math.random() - 0.5) * camera.shake;
    }
    return { x: sx, y: sy };
}

// ==========================================
//  STARFIELD
// ==========================================
const stars = [];

function generateStars() {
    const rng = mulberry32(42);
    for (let i = 0; i < 800; i++) {
        stars.push({
            x: rng() * 4000 - 2000,
            y: rng() * 4000 - 2000,
            size: rng() * 1.8 + 0.3,
            brightness: rng() * 0.7 + 0.3,
            layer: Math.floor(rng() * 3),
            twinkleSpeed: rng() * 3 + 1,
            twinkleOffset: rng() * Math.PI * 2
        });
    }
}

function renderStars(time) {
    const parallax = [0.02, 0.05, 0.1];
    for (const s of stars) {
        const p = parallax[s.layer];
        const sx = ((s.x - camera.x * p) % W + W) % W;
        const sy = ((s.y - camera.y * p) % H + H) % H;
        const twinkle = 0.7 + 0.3 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
        const alpha = s.brightness * twinkle;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ==========================================
//  PLANET GENERATION
// ==========================================
let planets = [];
let asteroids = [];
let star = null;

function generateSolarSystem(seed) {
    const rng = mulberry32(seed);
    const gs = gameSettings;
    planets = [];
    asteroids = [];

    star = {
        x: 0, y: 0,
        radius: 80,
        mass: 50000,
        color1: '#FFF4D0',
        color2: '#FFB800',
        color3: '#FF6600'
    };

    const planetCount = gs.planetCount[0] + Math.floor(rng() * (gs.planetCount[1] - gs.planetCount[0] + 1));
    // Shuffle landable types, always end with Gas for slingshot gameplay
    const landableTypes = [0, 1, 2, 3, 5]; // Rocky, Ice, Volcanic, Lush, Barren
    for (let j = landableTypes.length - 1; j > 0; j--) {
        const k = Math.floor(rng() * (j + 1));
        [landableTypes[j], landableTypes[k]] = [landableTypes[k], landableTypes[j]];
    }
    const typeOrder = [...landableTypes, 4]; // Gas giant always present as 6th
    for (let i = 0; i < planetCount; i++) {
        const type = PLANET_TYPES[typeOrder[i % typeOrder.length]];
        const isGas = type.name === 'Gas';

        const orbitRadius = 300 + i * 250 + rng() * 100;
        const orbitAngle = rng() * Math.PI * 2;
        const orbitSpeed = (0.025 / Math.sqrt(orbitRadius / 300)) * gs.orbitSpeedMult;
        const radius = isGas ? 45 + rng() * 25 : 18 + rng() * 18;
        const mass = radius * radius * (isGas ? 0.8 : 0.3);

        const pSeed = Math.floor(rng() * 100000);
        const planet = {
            x: Math.cos(orbitAngle) * orbitRadius,
            y: Math.sin(orbitAngle) * orbitRadius,
            radius,
            mass,
            orbitRadius,
            orbitAngle,
            orbitSpeed,
            type,
            seed: pSeed,
            name: generateName(pSeed),
            discovered: false,
            landed: false,
            texture: null,
            atmosphere: type.atmosphere,
            gravity: type.gravity,
            surfaceGravity: type.gravity * 70,
            isGas: isGas,
            circumference: isGas ? 0 : 1500 + radius * 40,
            resources: [],
            terrainCache: null,
            moons: []
        };
        planets.push(planet);
    }

    // Pre-render textures
    for (const p of planets) {
        p.texture = renderPlanetTexture(p);
    }

    // Generate moons
    if (gs.moonsEnabled) {
        for (const p of planets) {
            generateMoons(p, mulberry32(p.seed + 7777));
        }
    }

    // Generate asteroid belt
    if (gs.asteroidBelt && planets.length >= 4) {
        generateAsteroidBelt(mulberry32(seed + 9999));
    }
}

function generateMoons(planet, rng) {
    // Larger planets more likely to have more moons
    const sizeFactor = clamp(planet.radius / 25, 0.3, 2.0); // bigger planet → higher chance
    const maxMoons = Math.min(
        gameSettings.maxMoonsPerPlanet + (planet.isGas ? 1 : 0),
        Math.floor(sizeFactor * (gameSettings.maxMoonsPerPlanet + 1))
    );
    const moonCount = Math.floor(rng() * (maxMoons + 1));
    for (let i = 0; i < moonCount; i++) {
        // Each moon gets a distinct orbit distance (spaced out)
        const baseOrbit = 2.2 + i * 1.4; // each successive moon orbits further out
        const orbitRadius = planet.radius * (baseOrbit + rng() * 0.8);
        // Moon radius: 3-14px, but NEVER more than 60% of parent planet
        const maxMoonR = planet.radius * 0.6;
        const radius = Math.min(3 + rng() * 11, maxMoonR);
        const mSeed = planet.seed + 5000 + i;
        // Outer moons orbit slower
        const speedBase = 0.12 / Math.sqrt(baseOrbit / 2.2);
        planet.moons.push({
            orbitRadius,
            orbitAngle: rng() * Math.PI * 2,
            orbitSpeed: speedBase + (rng() - 0.5) * 0.04,
            radius,
            mass: radius * 0.3,
            name: generateName(mSeed),
            discovered: false,
            x: planet.x + Math.cos(0) * orbitRadius,
            y: planet.y + Math.sin(0) * orbitRadius,
            color: `hsl(${Math.floor(rng() * 60 + 160)}, ${Math.floor(rng() * 25 + 8)}%, ${Math.floor(rng() * 30 + 45)}%)`
        });
    }
}

function generateAsteroidBelt(rng) {
    if (planets.length < 4) return;
    const inner = planets[2].orbitRadius;
    const outer = planets[3].orbitRadius;
    const midRadius = (inner + outer) / 2;
    const spread = 60;
    const count = gameSettings.asteroidCount;
    for (let i = 0; i < count; i++) {
        const orbitRadius = midRadius + (rng() - 0.5) * spread * 2;
        const vertCount = 5 + Math.floor(rng() * 3);
        const vertices = [];
        for (let v = 0; v < vertCount; v++) {
            vertices.push(0.6 + rng() * 0.4);
        }
        asteroids.push({
            orbitRadius,
            orbitAngle: rng() * Math.PI * 2,
            orbitSpeed: (0.02 / Math.sqrt(orbitRadius / 300)) * gameSettings.orbitSpeedMult,
            size: 2 + rng() * 4,
            rotation: rng() * Math.PI * 2,
            rotSpeed: (rng() - 0.5) * 2,
            vertices,
            x: 0, y: 0
        });
    }
    // Init positions
    for (const a of asteroids) {
        a.x = Math.cos(a.orbitAngle) * a.orbitRadius;
        a.y = Math.sin(a.orbitAngle) * a.orbitRadius;
    }
}

function renderPlanetTexture(planet) {
    const size = Math.ceil(planet.radius * 2 + 4);
    const oc = document.createElement('canvas');
    oc.width = oc.height = size;
    const octx = oc.getContext('2d');
    const cx = size / 2, cy = size / 2, r = planet.radius;
    const type = planet.type;

    // Base gradient
    const grad = octx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.1, cx, cy, r);
    const hBase = type.baseH, sBase = type.baseS, lBase = type.baseL;
    grad.addColorStop(0, `hsl(${hBase}, ${sBase}%, ${lBase + 15}%)`);
    grad.addColorStop(0.7, `hsl(${hBase}, ${sBase}%, ${lBase}%)`);
    grad.addColorStop(1, `hsl(${hBase + 10}, ${sBase}%, ${lBase - 15}%)`);

    octx.fillStyle = grad;
    octx.beginPath();
    octx.arc(cx, cy, r, 0, Math.PI * 2);
    octx.fill();

    // Surface detail (noise-based)
    octx.save();
    octx.beginPath();
    octx.arc(cx, cy, r, 0, Math.PI * 2);
    octx.clip();

    const rng = mulberry32(planet.seed);
    if (planet.type.name === 'Gas') {
        // Horizontal bands for gas giants
        for (let y = -r; y < r; y += 3) {
            const bandNoise = fbm((y + planet.seed) * 0.05, 3, planet.seed);
            const lum = lBase - 10 + bandNoise * 25;
            octx.fillStyle = `hsla(${hBase + bandNoise * 20}, ${sBase}%, ${lum}%, 0.5)`;
            octx.fillRect(cx - r, cy + y, r * 2, 3);
        }
        // Great spot
        const spotX = cx + rng() * r * 0.4;
        const spotY = cy + rng() * r * 0.3 - r * 0.15;
        const spotR = r * 0.15;
        const spotGrad = octx.createRadialGradient(spotX, spotY, 0, spotX, spotY, spotR);
        spotGrad.addColorStop(0, `hsla(${hBase - 10}, ${sBase + 20}%, ${lBase + 10}%, 0.6)`);
        spotGrad.addColorStop(1, `hsla(${hBase}, ${sBase}%, ${lBase}%, 0)`);
        octx.fillStyle = spotGrad;
        octx.beginPath();
        octx.ellipse(spotX, spotY, spotR * 1.5, spotR, 0, 0, Math.PI * 2);
        octx.fill();
    } else {
        // Surface features (craters, patches)
        for (let i = 0; i < 20; i++) {
            const fx = cx + (rng() - 0.5) * r * 1.6;
            const fy = cy + (rng() - 0.5) * r * 1.6;
            const fr = rng() * r * 0.25 + 2;
            const fl = lBase + (rng() - 0.5) * 20;
            const fGrad = octx.createRadialGradient(fx, fy, 0, fx, fy, fr);
            fGrad.addColorStop(0, `hsla(${hBase + rng() * 15}, ${sBase}%, ${fl}%, 0.4)`);
            fGrad.addColorStop(1, `hsla(${hBase}, ${sBase}%, ${lBase}%, 0)`);
            octx.fillStyle = fGrad;
            octx.beginPath();
            octx.arc(fx, fy, fr, 0, Math.PI * 2);
            octx.fill();
        }
    }
    octx.restore();

    // Shadow (from star light - top-left illumination)
    const shadowGrad = octx.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.5, cx + r * 0.2, cy + r * 0.2, r * 1.1);
    shadowGrad.addColorStop(0, 'rgba(0,0,0,0)');
    shadowGrad.addColorStop(0.6, 'rgba(0,0,0,0.1)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
    octx.fillStyle = shadowGrad;
    octx.beginPath();
    octx.arc(cx, cy, r, 0, Math.PI * 2);
    octx.fill();

    return oc;
}

function updatePlanets(dt) {
    const orbitFactor = ({off:0, slow:0.3, normal:1.0, fast:3.0})[gameSettings.orbitMode] || 1;
    for (const p of planets) {
        p.orbitAngle += p.orbitSpeed * orbitFactor * dt;
        p.x = Math.cos(p.orbitAngle) * p.orbitRadius;
        p.y = Math.sin(p.orbitAngle) * p.orbitRadius;
        // Update moons
        for (const m of p.moons) {
            m.orbitAngle += m.orbitSpeed * orbitFactor * dt;
            m.x = p.x + Math.cos(m.orbitAngle) * m.orbitRadius;
            m.y = p.y + Math.sin(m.orbitAngle) * m.orbitRadius;
        }
    }
    // Update asteroids
    for (const a of asteroids) {
        a.orbitAngle += a.orbitSpeed * orbitFactor * dt;
        a.x = Math.cos(a.orbitAngle) * a.orbitRadius;
        a.y = Math.sin(a.orbitAngle) * a.orbitRadius;
        a.rotation += a.rotSpeed * dt;
    }
}

// ==========================================
//  SHIP
// ==========================================
const ship = {
    x: 0, y: 0, vx: 0, vy: 0,
    angle: 0, fuel: gameSettings.fuelMax,
    minerals: 0, thrusting: false,
    trail: [],
    discovered: new Set()
};

function resetShip() {
    const startPlanet = planets[0];
    const startDist = startPlanet.orbitRadius + 80;
    ship.x = Math.cos(startPlanet.orbitAngle) * startDist;
    ship.y = Math.sin(startPlanet.orbitAngle) * startDist;
    // Give orbital velocity perpendicular to star direction
    const a = Math.atan2(ship.y, ship.x);
    const orbitalV = Math.sqrt(G * gameSettings.gravityMult * star.mass / startDist) * 0.9;
    ship.vx = -Math.sin(a) * orbitalV;
    ship.vy = Math.cos(a) * orbitalV;
    ship.angle = a + Math.PI / 2;
    ship.fuel = gameSettings.fuelMax;
    ship.minerals = 0;
    ship.thrusting = false;
    ship.trail = [];
    ship.discovered = new Set();
}

// ==========================================
//  PHYSICS
// ==========================================
function calcGravity(px, py, bodies) {
    let ax = 0, ay = 0;
    const effectiveG = G * gameSettings.gravityMult;
    // Star gravity
    const sdx = star.x - px, sdy = star.y - py;
    const sd = Math.sqrt(sdx * sdx + sdy * sdy);
    if (sd > 10) {
        const sf = effectiveG * star.mass / (sd * sd);
        ax += (sdx / sd) * sf;
        ay += (sdy / sd) * sf;
    }
    // Planet gravity
    for (const b of bodies) {
        const dx = b.x - px, dy = b.y - py;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 5) {
            const f = effectiveG * b.mass / (d * d);
            ax += (dx / d) * f;
            ay += (dy / d) * f;
        }
    }
    // Moon gravity
    for (const b of bodies) {
        if (!b.moons) continue;
        for (const m of b.moons) {
            const dx = m.x - px, dy = m.y - py;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > 3) {
                const f = effectiveG * m.mass / (d * d);
                ax += (dx / d) * f;
                ay += (dy / d) * f;
            }
        }
    }
    return { ax, ay };
}

function getNearestPlanet() {
    let nearest = null, minDist = Infinity;
    for (const p of planets) {
        const d = dist(ship.x, ship.y, p.x, p.y);
        if (d < minDist) { minDist = d; nearest = p; }
    }
    return { planet: nearest, dist: minDist };
}

// ==========================================
//  ORBIT PREDICTION
// ==========================================
function computeOrbitPrediction() {
    let px = ship.x, py = ship.y;
    let pvx = ship.vx, pvy = ship.vy;
    const points = [];
    const pdt = 0.03;
    for (let i = 0; i < PREDICTION_STEPS; i++) {
        const { ax, ay } = calcGravity(px, py, planets);
        pvx += ax * pdt;
        pvy += ay * pdt;
        px += pvx * pdt;
        py += pvy * pdt;
        if (i % 2 === 0) points.push({ x: px, y: py });
    }
    return points;
}

// ==========================================
//  TERRAIN GENERATION (periodic for circumnavigation)
// ==========================================
function getTerrainHeight(worldX, planet) {
    const circ = planet.circumference || 3000;
    const ang = (worldX / circ) * Math.PI * 2;
    // Map to circle in 2D noise space for seamless wrapping
    const cx = Math.cos(ang) * 2;
    const cy = Math.sin(ang) * 2;
    const s = planet.seed;
    let h = 0;
    h += fbm2D(cx * 1.2 + s * 0.01, cy * 1.2 + s * 0.013, 4, s) * 150;
    h += fbm2D(cx * 3.5 + s * 0.02, cy * 3.5 + s * 0.027, 3, s + 100) * 50;
    h += fbm2D(cx * 9 + s * 0.03, cy * 9 + s * 0.037, 2, s + 200) * 15;
    return h;
}

// ==========================================
//  RESOURCE GENERATION
// ==========================================
function generateResources(planet) {
    if (planet.isGas) return;
    const rng = mulberry32(planet.seed + 999);
    planet.resources = [];
    const circ = planet.circumference;
    const count = 8 + Math.floor(rng() * 6);
    for (let i = 0; i < count; i++) {
        const rx = rng() * circ; // spread evenly around circumference
        const isFuel = rng() > 0.4;
        planet.resources.push({
            x: rx,
            type: isFuel ? 'fuel' : 'mineral',
            collected: false,
            bobOffset: rng() * Math.PI * 2
        });
    }
}

let gameState = 'TITLE';
let stateTime = 0;
let transition = { active: false, alpha: 0, target: null, callback: null };
let gameTime = 0;
let systemSeed = Date.now();
let gameOverFuelTimer = 0;
let gameOverMessage = '';
let gameOverTimer = 0;
let victoryTimer = 0;
let victoryTriggered = false;

// Landing state data
const landing = {
    planet: null,
    x: 0, y: 0,     // ship position (x=horizontal, y=altitude)
    vx: 0, vy: 0,
    angle: 0,
    terrainPoints: [],
    maxAlt: 2000,
    resolved: false  // true after crash or successful landing
};

// Surface state data
const surface = {
    planet: null,
    playerX: 0, playerY: 0,
    playerVX: 0, playerVY: 0,
    onGround: false,
    shipX: 0,
    facingRight: true
};

// Launch state data
const launch = {
    planet: null,
    x: 0, y: 0,
    vy: 0,
    timer: 0,
    resolved: false,
    countdown: 3.0,
    countdownActive: true
};

// Discovery log
let showLog = false;

function changeState(newState, data) {
    transition.active = true;
    transition.alpha = 0;
    transition.target = newState;
    transition.callback = () => {
        const prevState = gameState;
        gameState = newState;
        stateTime = 0;
        enterState(newState, data, prevState);
    };
}

function enterState(state, data, prevState) {
    particles.length = 0;
    switch (state) {
        case 'TITLE':
            break;
        case 'SETTINGS':
            // Reset settings UI selection
            settingsUI.selectedIndex = 0;
            break;
        case 'ORBIT':
            if (prevState === 'SETTINGS') {
                generateSolarSystem(systemSeed);
                generateStars();
                resetShip();
                camera.x = ship.x;
                camera.y = ship.y;
                camera.targetZoom = 0.4;
                camera.zoom = 0.1;
            }
            if (data && data.fromLaunch) {
                const p = data.planet;
                const launchAngle = Math.atan2(p.y, p.x) + Math.PI;
                const launchDist = p.radius + 60;
                ship.x = p.x + Math.cos(launchAngle) * launchDist;
                ship.y = p.y + Math.sin(launchAngle) * launchDist;
                const orbAngle = Math.atan2(ship.y, ship.x);
                const orbSpeed = Math.sqrt(G * gameSettings.gravityMult * star.mass / dist(0, 0, ship.x, ship.y)) * 0.8;
                ship.vx = -Math.sin(orbAngle) * orbSpeed;
                ship.vy = Math.cos(orbAngle) * orbSpeed;
                ship.angle = Math.atan2(ship.vy, ship.vx);
                camera.x = ship.x;
                camera.y = ship.y;
            }
            break;
        case 'LANDING':
            landing.planet = data.planet;
            landing.x = data.planet.circumference / 2; // land at a spot
            landing.y = landing.maxAlt;
            landing.vx = 0;
            landing.vy = -15;
            landing.resolved = false;
            landing.angle = 0;
            generateResources(landing.planet);
            break;
        case 'SURFACE':
            surface.planet = data.planet;
            surface.shipX = wrapX(data.landX || 0, data.planet.circumference);
            surface.playerX = surface.shipX;
            surface.playerY = getTerrainHeight(surface.playerX, data.planet);
            surface.playerVX = 0;
            surface.playerVY = 0;
            surface.onGround = true;
            surface.facingRight = true;
            break;
        case 'LAUNCH':
            launch.planet = data.planet;
            launch.x = data.shipX || 0;
            launch.y = getTerrainHeight(data.shipX || 0, data.planet);
            launch.vy = 0;
            launch.timer = 0;
            launch.resolved = false;
            launch.countdown = 3.0;
            launch.countdownActive = true;
            break;
    }
}

let titleSystemReady = false;

function initTitleSystem() {
    // Generate a showcase solar system for the title background
    const savedSettings = { ...gameSettings };
    gameSettings = { ...DIFFICULTY_PRESETS.normal, moonsEnabled: true, maxMoonsPerPlanet: 1 };
    generateSolarSystem(12345);
    generateStars();
    gameSettings = savedSettings;
    titleSystemReady = true;
}

function updateTitle(dt) {
    stateTime += dt;
    if (!titleSystemReady) initTitleSystem();
    // Animate planets orbiting for the background
    updatePlanets(dt);
    if (Object.keys(keysJustPressed).length > 0 && stateTime > 0.5) {
        if (!audioCtx) initAudio();
        titleSystemReady = false; // regenerate next time we return
        changeState('SETTINGS');
    }
}

function renderTitle(time) {
    ctx.fillStyle = '#030308';
    ctx.fillRect(0, 0, W, H);

    // === ANIMATED SOLAR SYSTEM BACKGROUND ===
    if (titleSystemReady) {
        // Starfield
        renderStars(time);

        // Camera centered on star, zoomed out to see the whole system
        const titleZoom = Math.min(W, H) / 4000;
        const cx = 0, cy = 0;

        // Star corona
        const ss = { x: W / 2, y: H / 2 };
        const sr = star.radius * titleZoom;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const coronaSize = sr * 3.5;
        const corona = ctx.createRadialGradient(ss.x, ss.y, sr * 0.5, ss.x, ss.y, coronaSize);
        corona.addColorStop(0, 'rgba(255,200,100,0.25)');
        corona.addColorStop(0.3, 'rgba(255,150,50,0.08)');
        corona.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = corona;
        ctx.beginPath();
        ctx.arc(ss.x, ss.y, coronaSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();

        // Star body
        const starGrad = ctx.createRadialGradient(ss.x - sr * 0.2, ss.y - sr * 0.2, sr * 0.1, ss.x, ss.y, sr);
        starGrad.addColorStop(0, '#FFFEF0');
        starGrad.addColorStop(0.5, '#FFE880');
        starGrad.addColorStop(1, '#FF9900');
        ctx.fillStyle = starGrad;
        ctx.beginPath();
        ctx.arc(ss.x, ss.y, sr, 0, Math.PI * 2);
        ctx.fill();

        // Orbit lines
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 0.5;
        for (const p of planets) {
            const or = p.orbitRadius * titleZoom;
            ctx.beginPath();
            ctx.arc(W / 2, H / 2, or, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Planets
        for (const p of planets) {
            const px = W / 2 + p.x * titleZoom;
            const py = H / 2 + p.y * titleZoom;
            const pr = Math.max(p.radius * titleZoom, 2);

            // Atmosphere glow
            if (p.atmosphere > 0 && p.type.atmoColor) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                const glowR = pr * (1 + p.atmosphere * 0.6);
                const atmoGrad = ctx.createRadialGradient(px, py, pr * 0.9, px, py, glowR);
                atmoGrad.addColorStop(0, p.type.atmoColor);
                atmoGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = atmoGrad;
                ctx.beginPath();
                ctx.arc(px, py, glowR, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.restore();
            }

            // Planet texture
            if (p.texture && pr > 1.5) {
                ctx.drawImage(p.texture, px - pr, py - pr, pr * 2, pr * 2);
            } else {
                ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${p.type.baseL}%)`;
                ctx.beginPath();
                ctx.arc(px, py, pr, 0, Math.PI * 2);
                ctx.fill();
            }

            // Moons
            for (const m of p.moons) {
                const mx = W / 2 + m.x * titleZoom;
                const my = H / 2 + m.y * titleZoom;
                const mr = Math.max(m.radius * titleZoom, 1);
                ctx.fillStyle = m.color;
                ctx.beginPath();
                ctx.arc(mx, my, mr, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // === DARK VIGNETTE OVERLAY for text readability ===
    const vigGrad = ctx.createRadialGradient(W / 2, H * 0.45, H * 0.15, W / 2, H * 0.45, H * 0.8);
    vigGrad.addColorStop(0, 'rgba(0,0,10,0.55)');
    vigGrad.addColorStop(0.5, 'rgba(0,0,10,0.35)');
    vigGrad.addColorStop(1, 'rgba(0,0,10,0.15)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);

    // === TITLE TEXT ===
    const pulse = 0.8 + 0.2 * Math.sin(time * 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowColor = '#4488FF';
    ctx.shadowBlur = 30 * pulse;
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `bold ${Math.min(W * 0.1, 80)}px 'Courier New', monospace`;
    ctx.fillText('VOYAGER', W / 2, H * 0.3);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#8899AA';
    ctx.font = `${Math.min(W * 0.025, 18)}px 'Courier New', monospace`;
    ctx.fillText('A Space Exploration Game', W / 2, H * 0.4);

    // Controls
    const controls = [
        'WASD / Arrows - Navigate',
        'Scroll - Zoom (orbit)',
        'E - Interact / Land / Launch',
        'Tab - Discovery Log',
        'Space - Jump (surface)'
    ];
    ctx.fillStyle = '#556677';
    ctx.font = `${Math.min(W * 0.02, 14)}px 'Courier New', monospace`;
    controls.forEach((line, i) => {
        ctx.fillText(line, W / 2, H * 0.54 + i * 24);
    });

    // Blink prompt
    if (Math.sin(time * 3) > 0) {
        ctx.fillStyle = '#AABBCC';
        ctx.font = `${Math.min(W * 0.022, 16)}px 'Courier New', monospace`;
        ctx.fillText('[ Press any key to begin ]', W / 2, H * 0.82);
    }
}

const settingsUI = {

        { label: 'Asteroid Belt', type: 'toggle', key: 'asteroidBelt' },
        { label: 'Moons', type: 'toggle', key: 'moonsEnabled' },
        { label: 'Planet Orbits', type: 'select', options: ['off','slow','normal','fast'], key: 'orbitMode' },
        { label: '[ LAUNCH ]', type: 'button', key: 'launch' }
    ]
};

function getSettingsValue(key) {
    if (key === 'difficulty') return settingsUI.difficulty;
    if (key === 'planetCount') return settingsUI.custom.planetCount[0];
    return settingsUI.custom[key];
}

function setSettingsValue(key, val) {
    if (key === 'difficulty') {
        settingsUI.difficulty = val;
        if (val !== 'custom') {
            settingsUI.custom = { ...DIFFICULTY_PRESETS[val] };
        }
        return;
    }
    if (key === 'planetCount') {
        settingsUI.custom.planetCount = [val, val];
    } else {
        settingsUI.custom[key] = val;
    }
    // Auto-set dependent values when toggles change
    if (key === 'asteroidBelt') {
        settingsUI.custom.asteroidCount = val ? 80 : 0;
    }
    if (key === 'moonsEnabled') {
        settingsUI.custom.maxMoonsPerPlanet = val ? 2 : 0;
    }
    settingsUI.difficulty = 'custom';
}

function updateSettings(dt) {
    stateTime += dt;
    const items = settingsUI.items;
    const idx = settingsUI.selectedIndex;
    const item = items[idx];

    // Navigation
    if (justPressed('ArrowDown') || justPressed('KeyS')) {
        settingsUI.selectedIndex = (idx + 1) % items.length;
        playSound(400, 0.08, 'sine', 0.05);
    }
    if (justPressed('ArrowUp') || justPressed('KeyW')) {
        settingsUI.selectedIndex = (idx - 1 + items.length) % items.length;
        playSound(400, 0.08, 'sine', 0.05);
    }

    // Left/Right to adjust
    if (justPressed('ArrowLeft') || justPressed('KeyA')) {
        adjustSettingsItem(item, -1);
    }
    if (justPressed('ArrowRight') || justPressed('KeyD')) {
        adjustSettingsItem(item, 1);
    }

    // Enter / Space to activate buttons or toggle
    if (justPressed('Enter') || justPressed('Space')) {
        if (item.type === 'button' && item.key === 'launch') {
            launchFromSettings();
        } else if (item.type === 'toggle') {
            setSettingsValue(item.key, !getSettingsValue(item.key));
            playSound(500, 0.1, 'sine', 0.08);
        }
    }

    // Escape back to title
    if (justPressed('Escape')) {
        changeState('TITLE');
    }
}

function adjustSettingsItem(item, dir) {
    if (item.type === 'select') {
        const opts = item.options;
        const cur = getSettingsValue(item.key);
        let ci = opts.indexOf(cur);
        ci = (ci + dir + opts.length) % opts.length;
        setSettingsValue(item.key, opts[ci]);
        playSound(450, 0.1, 'sine', 0.06);
    } else if (item.type === 'slider') {
        let val = getSettingsValue(item.key);
        val += item.step * dir;
        val = Math.round(val * 100) / 100; // avoid float drift
        val = clamp(val, item.min, item.max);
        setSettingsValue(item.key, val);
        playSound(450, 0.1, 'sine', 0.06);
    } else if (item.type === 'toggle') {
        setSettingsValue(item.key, !getSettingsValue(item.key));
        playSound(500, 0.1, 'sine', 0.08);
    }
}

function launchFromSettings() {
    // Copy custom settings to gameSettings
    gameSettings = { ...settingsUI.custom };
    // Ensure planetCount is array
    if (!Array.isArray(gameSettings.planetCount)) {
        gameSettings.planetCount = [gameSettings.planetCount, gameSettings.planetCount];
    }
    if (!audioCtx) initAudio();
    playSound(300, 0.3, 'sine', 0.15);
    changeState('ORBIT');
}
