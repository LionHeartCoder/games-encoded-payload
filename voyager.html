                const sliderY = y;
                const pct = clamp((val - item.min) / (item.max - item.min), 0, 1);
                ctx.fillStyle = 'rgba(40,60,80,0.6)';
                ctx.fillRect(sliderX, sliderY - 3, sliderW, 6);
                ctx.fillStyle = selected ? '#3388CC' : '#446688';
                ctx.fillRect(sliderX, sliderY - 3, sliderW * pct, 6);
                // Slider knob
                ctx.fillStyle = selected ? '#AADDFF' : '#88AABB';
                ctx.beginPath();
                ctx.arc(sliderX + sliderW * pct, sliderY, 5, 0, Math.PI * 2);
                ctx.fill();
                // Value text
                ctx.textAlign = 'right';
                ctx.fillStyle = selected ? '#FFFFFF' : '#99AABB';
                ctx.fillText(valStr, menuX + menuW, y);
            } else if (item.type === 'toggle') {
                const on = !!val;
                ctx.fillStyle = on ? (selected ? '#55EE88' : '#44AA66') : (selected ? '#CC5555' : '#885555');
                ctx.fillText(on ? 'ON' : 'OFF', menuX + menuW, y);
            }
        }
    }

    // Bottom instructions
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#445566';
    ctx.font = `${Math.min(W * 0.016, 12)}px 'Courier New', monospace`;
    ctx.fillText('Up/Down: Navigate   Left/Right: Adjust   Enter: Launch   Esc: Back', W / 2, H - 15);
}

// ==========================================
//  STATE: ORBIT
// ==========================================
function updateOrbit(dt) {
    stateTime += dt;

    // Ship rotation
    const rotSpeed = 2.2;
    if (leftKey()) ship.angle -= rotSpeed * dt;
    if (rightKey()) ship.angle += rotSpeed * dt;

    // Thrust
    ship.thrusting = thrustKey() && ship.fuel > 0;
    if (ship.thrusting) {
        ship.vx += Math.cos(ship.angle) * ORBIT_THRUST * dt;
        ship.vy += Math.sin(ship.angle) * ORBIT_THRUST * dt;
        ship.fuel -= FUEL_BURN_RATE * dt;
        ship.fuel = Math.max(0, ship.fuel);
        setThrustSound(true);

        // Exhaust particles
        for (let i = 0; i < 3; i++) {
            const spread = (Math.random() - 0.5) * 0.5;
            const speed = 60 + Math.random() * 40;
            emitParticle(
                ship.x - Math.cos(ship.angle) * 10,
                ship.y - Math.sin(ship.angle) * 10,
                -Math.cos(ship.angle + spread) * speed + ship.vx * 0.3,
                -Math.sin(ship.angle + spread) * speed + ship.vy * 0.3,
                0.5 + Math.random() * 0.5,
                2 + Math.random() * 2,
                255, 150 + Math.random() * 100 | 0, 50
            );
        }
    } else {
        setThrustSound(false);
    }

    // Brake
    if (brakeKey()) {
        const speed = Math.sqrt(ship.vx ** 2 + ship.vy ** 2);
        if (speed > 1) {
            const brakeFactor = Math.exp(-2 * dt);
            ship.vx *= brakeFactor;
            ship.vy *= brakeFactor;
        }
    }

    // Gravity
    const { ax, ay } = calcGravity(ship.x, ship.y, planets);
    ship.vx += ax * dt;
    ship.vy += ay * dt;

    // Move
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;

    // Trail
    ship.trail.push({ x: ship.x, y: ship.y });
    if (ship.trail.length > TRAIL_LENGTH) ship.trail.shift();

    // Update planets
    updatePlanets(dt);

    // Camera
    updateCamera(ship.x, ship.y, dt);

    // Planet proximity check
    const { planet: nearest, dist: nearDist } = getNearestPlanet();
    if (nearest) {
        // Auto-discover ANY planet (including gas giants) by flying close
        if (nearDist < nearest.radius * 4) {
            if (!ship.discovered.has(nearest)) {
                ship.discovered.add(nearest);
                nearest.discovered = true;
                playSound(600, 0.3, 'sine', 0.15);
                playSound(800, 0.2, 'sine', 0.1);
            }
        }

        // Planet collision — crash into the surface
        if (nearDist < nearest.radius * 1.1) {
            triggerGameOver('Crashed into ' + nearest.name + '!');
            return;
        }
    }

    // Moon proximity check
    for (const p of planets) {
        for (const m of p.moons) {
            const mDist = dist(ship.x, ship.y, m.x, m.y);
            if (mDist < m.radius * 6 && !m.discovered) {
                m.discovered = true;
                playSound(650, 0.25, 'sine', 0.12);
            }
            if (mDist < m.radius * 1.2) {
                triggerGameOver('Crashed into moon ' + m.name + '!');
                return;
            }
        }
    }

    // Asteroid collision check
    for (const a of asteroids) {
        const aDist = dist(ship.x, ship.y, a.x, a.y);
        if (aDist < a.size + 5) {
            triggerGameOver('Destroyed by an asteroid!');
            return;
        }
    }

    // Land interaction
    if (interactKey()) {
        if (nearest && nearDist < nearest.radius * 3) {
            if (nearest.isGas) {
                camera.shake = 5;
                playSound(150, 0.3, 'square', 0.1);
            } else {
                changeState('LANDING', { planet: nearest });
                playSound(200, 0.5, 'sine', 0.2);
            }
        }
    }

    // Discovery log toggle
    if (justPressed('Tab')) showLog = !showLog;

    // Star collision
    const starDist = dist(ship.x, ship.y, star.x, star.y);
    if (starDist < star.radius * 1.2) {
        triggerGameOver('Burned up in the star!');
        return;
    }

    // Out of fuel check
    if (ship.fuel <= 0) {
        gameOverFuelTimer = (gameOverFuelTimer || 0) + dt;
        if (gameOverFuelTimer > 3) {
            triggerGameOver('Lost in space — out of fuel!');
            return;
        }
    } else {
        gameOverFuelTimer = 0;
    }

    updateParticles(dt);
}

function renderOrbit(time) {
    // Background
    ctx.fillStyle = '#030308';
    ctx.fillRect(0, 0, W, H);

    renderStars(time);

    // Star
    const ss = worldToScreen(star.x, star.y);
    const sr = star.radius * camera.zoom;

    // Star corona
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const coronaSize = sr * 3;
    const corona = ctx.createRadialGradient(ss.x, ss.y, sr * 0.5, ss.x, ss.y, coronaSize);
    corona.addColorStop(0, 'rgba(255,200,100,0.3)');
    corona.addColorStop(0.3, 'rgba(255,150,50,0.1)');
    corona.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = corona;
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, coronaSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    // Star body
    const starGrad = ctx.createRadialGradient(ss.x - sr * 0.2, ss.y - sr * 0.2, sr * 0.1, ss.x, ss.y, sr);
    starGrad.addColorStop(0, '#FFFEF0');
    starGrad.addColorStop(0.5, '#FFE880');
    starGrad.addColorStop(1, '#FF9900');
    ctx.fillStyle = starGrad;
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, sr, 0, Math.PI * 2);
    ctx.fill();

    // Orbit lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (const p of planets) {
        const os = worldToScreen(0, 0);
        const or2 = p.orbitRadius * camera.zoom;
        ctx.beginPath();
        ctx.arc(os.x, os.y, or2, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Planets
    for (const p of planets) {
        const pp = worldToScreen(p.x, p.y);
        const pr = p.radius * camera.zoom;

        if (pp.x < -pr * 3 || pp.x > W + pr * 3 || pp.y < -pr * 3 || pp.y > H + pr * 3) continue;

        // Atmosphere glow
        if (p.atmosphere > 0 && p.type.atmoColor) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const glowR = pr * (1 + p.atmosphere * 0.6);
            const atmoGrad = ctx.createRadialGradient(pp.x, pp.y, pr * 0.9, pp.x, pp.y, glowR);
            atmoGrad.addColorStop(0, p.type.atmoColor);
            atmoGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = atmoGrad;
            ctx.beginPath();
            ctx.arc(pp.x, pp.y, glowR, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
        }

        // Planet texture
        if (p.texture) {
            ctx.drawImage(p.texture, pp.x - pr, pp.y - pr, pr * 2, pr * 2);
        }

        // Name label (if discovered or close)
        const shipDist = dist(ship.x, ship.y, p.x, p.y);
        if (p.discovered || shipDist < p.radius * 5) {
            ctx.fillStyle = 'rgba(200,220,255,0.6)';
            ctx.font = `${clamp(10 * camera.zoom, 8, 14)}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(p.name, pp.x, pp.y + pr + 14 * camera.zoom);
            if (p.isGas) {
                ctx.fillStyle = 'rgba(255,100,100,0.5)';
                ctx.fillText('[Gas Giant]', pp.x, pp.y + pr + 26 * camera.zoom);
            }
        }
    }

    // Moons
    for (const p of planets) {
        for (const m of p.moons) {
            const mp = worldToScreen(m.x, m.y);
            const mr = Math.max(m.radius * camera.zoom, 1.5);
            if (mp.x < -mr * 3 || mp.x > W + mr * 3 || mp.y < -mr * 3 || mp.y > H + mr * 3) continue;
            // Faint orbit ring around parent
            const pp = worldToScreen(p.x, p.y);
            const mor = m.orbitRadius * camera.zoom;
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.arc(pp.x, pp.y, mor, 0, Math.PI * 2);
            ctx.stroke();
            // Moon body
            ctx.fillStyle = m.color || '#AABBCC';
            ctx.beginPath();
            ctx.arc(mp.x, mp.y, mr, 0, Math.PI * 2);
            ctx.fill();
            // Name label
            const mShipDist = dist(ship.x, ship.y, m.x, m.y);
            if (m.discovered || mShipDist < m.radius * 8) {
                ctx.fillStyle = 'rgba(180,200,220,0.5)';
                ctx.font = `${clamp(8 * camera.zoom, 6, 11)}px 'Courier New', monospace`;
                ctx.textAlign = 'center';
                ctx.fillText(m.name, mp.x, mp.y + mr + 8 * camera.zoom);
            }
        }
    }

    // Asteroids
    if (asteroids.length > 0) {
        ctx.fillStyle = '#888890';
        for (const a of asteroids) {
            const ap = worldToScreen(a.x, a.y);
            const ar = a.size * camera.zoom;
            if (ap.x < -20 || ap.x > W + 20 || ap.y < -20 || ap.y > H + 20) continue;
            ctx.save();
            ctx.translate(ap.x, ap.y);
            ctx.rotate(a.rotation);
            ctx.beginPath();
            const verts = a.vertices;
            for (let v = 0; v < verts.length; v++) {
                const ang = (v / verts.length) * Math.PI * 2;
                const r = ar * verts[v];
                const vx = Math.cos(ang) * r;
                const vy = Math.sin(ang) * r;
                if (v === 0) ctx.moveTo(vx, vy);
                else ctx.lineTo(vx, vy);
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
    }

    // Orbit prediction
    const prediction = computeOrbitPrediction();
    ctx.strokeStyle = 'rgba(100,150,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    for (let i = 0; i < prediction.length; i++) {
        const pp = worldToScreen(prediction[i].x, prediction[i].y);
        if (i === 0) ctx.moveTo(pp.x, pp.y);
        else ctx.lineTo(pp.x, pp.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Ship trail
    if (ship.trail.length > 1) {
        for (let i = 1; i < ship.trail.length; i++) {
            const alpha = i / ship.trail.length * 0.3;
            const p1 = worldToScreen(ship.trail[i - 1].x, ship.trail[i - 1].y);
            const p2 = worldToScreen(ship.trail[i].x, ship.trail[i].y);
            ctx.strokeStyle = `rgba(100,180,255,${alpha})`;
            ctx.lineWidth = 1.5 * camera.zoom;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
    }

    // Particles
    renderParticles(camera.x, camera.y, camera.zoom);

    // Ship
    const sp = worldToScreen(ship.x, ship.y);
    ctx.save();
    ctx.translate(sp.x, sp.y);
    ctx.rotate(ship.angle);

    const shipScale = Math.max(camera.zoom * 1.2, 0.6);
    ctx.scale(shipScale, shipScale);

    // Ship body
    ctx.fillStyle = '#CCD0D8';
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#6688AA';
    ctx.beginPath();
    ctx.arc(4, 0, 3, 0, Math.PI * 2);
    ctx.fill();

    // Engine glow
    if (ship.thrusting) {
        const flicker = 0.7 + Math.random() * 0.3;
        ctx.fillStyle = `rgba(255,120,20,${flicker})`;
        ctx.beginPath();
        ctx.moveTo(-5, -4);
        ctx.lineTo(-18 - Math.random() * 10, 0);
        ctx.lineTo(-5, 4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = `rgba(255,200,100,${flicker * 0.5})`;
        ctx.beginPath();
        ctx.moveTo(-5, -2);
        ctx.lineTo(-12 - Math.random() * 6, 0);
        ctx.lineTo(-5, 2);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();

    // Approach prompt
    const { planet: nearest, dist: nearDist } = getNearestPlanet();
    if (nearest && nearDist < nearest.radius * 3) {
        ctx.textAlign = 'center';
        ctx.font = '14px "Courier New", monospace';
        if (nearest.isGas) {
            ctx.fillStyle = 'rgba(255,150,100,0.7)';
            ctx.fillText('[ Gravity too strong to land ]', W / 2, H * 0.7);
        } else {
            ctx.fillStyle = 'rgba(150,200,255,0.8)';
            ctx.fillText(`[ Press E to land on ${nearest.name} ]`, W / 2, H * 0.7);
        }
    }

    // HUD
    renderOrbitHUD(nearest, nearDist);

    // Discovery log overlay
    if (showLog) renderDiscoveryLog();
}

function renderOrbitHUD(nearest, nearDist) {
    const pad = 20;
    const speed = Math.sqrt(ship.vx ** 2 + ship.vy ** 2);

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.font = '13px "Courier New", monospace';

    // Fuel bar
    const barW = 160, barH = 12;
    const fuelPct = ship.fuel / gameSettings.fuelMax;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(pad, pad, barW, barH);
    const fuelColor = fuelPct > 0.3 ? '#44CC66' : fuelPct > 0.1 ? '#CCAA44' : '#CC4444';
    ctx.fillStyle = fuelColor;
    ctx.fillRect(pad, pad, barW * fuelPct, barH);
    ctx.strokeStyle = 'rgba(150,180,200,0.5)';
    ctx.strokeRect(pad, pad, barW, barH);
    ctx.fillStyle = '#AAC';
    ctx.fillText(`FUEL ${(fuelPct * 100).toFixed(0)}%`, pad, pad + barH + 4);

    // Speed
    ctx.fillText(`VEL ${speed.toFixed(0)} m/s`, pad, pad + barH + 22);

    // Minerals
    ctx.fillText(`MINERALS ${ship.minerals}`, pad, pad + barH + 40);

    // Nearest planet info
    if (nearest) {
        ctx.textAlign = 'right';
        ctx.fillStyle = '#8899AA';
        ctx.fillText(nearest.name + (nearest.discovered ? ' [Discovered]' : ''), W - pad, pad);
        ctx.fillText(`Distance: ${nearDist.toFixed(0)}`, W - pad, pad + 18);
        ctx.fillText(`Type: ${nearest.type.name}`, W - pad, pad + 36);
        if (!nearest.isGas) {
            ctx.fillText(`Gravity: ${nearest.gravity.toFixed(1)}x`, W - pad, pad + 54);
        }
    }

    // Planet count
    const discovered = planets.filter(p => p.discovered).length;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#667788';
    ctx.fillText(`Planets Discovered: ${discovered} / ${planets.length}`, W / 2, H - pad - 10);

    // Win check — trigger victory state
    if (discovered === planets.length && !victoryTriggered) {
        victoryTriggered = true;
        victoryTimer = 0;
        gameState = 'VICTORY';
        playSound(500, 0.4, 'sine', 0.2);
        playSound(700, 0.3, 'sine', 0.15);
        playSound(900, 0.5, 'sine', 0.2);
    }
}

// ==========================================
//  STATE: LANDING
// ==========================================
function updateLanding(dt) {
    stateTime += dt;
    const p = landing.planet;

    // After crash or successful landing, only update particles
    if (landing.resolved) {
        ship.thrusting = false;
        setThrustSound(false);
        updateParticles(dt);
        if (justPressed('Tab')) showLog = !showLog;
        return;
    }

    // Controls
    if (thrustKey() && ship.fuel > 0) {
        landing.vy += LANDING_THRUST * dt;
        ship.fuel -= FUEL_BURN_RATE * dt;
        ship.fuel = Math.max(0, ship.fuel);
        ship.thrusting = true;
        setThrustSound(true);

        // Thrust particles — compute ship screen Y using same formula as renderer
        const _altPct = clamp(landing.y / landing.maxAlt, 0, 1);
        const _atmoF = clamp(1 - _altPct, 0, 1);
        const _zoomLvl = lerp(1.8, 1.0, _altPct);
        const _horizY = lerp(H * 0.92, H * 0.82, _altPct);
        const _tAmp = lerp(2, 25, _atmoF);
        const _tH = getTerrainHeight(landing.x, landing.planet);
        const _terrScrY = _horizY - _tAmp * _tH / 150;
        const _lowY = _terrScrY - 18 * _zoomLvl;
        const _highY = H * 0.22;
        const _hAbove = Math.max(0, landing.y - _tH);
        const _normH = clamp(_hAbove / (landing.maxAlt * 0.8), 0, 1);
        const _blend = smoothstep(clamp(_normH * 2.0, 0, 1));
        const _shipY = clamp(lerp(_lowY, _highY, _blend), H * 0.08, H * 0.88);
        for (let i = 0; i < 3; i++) {
            emitParticle(
                W / 2 + (Math.random() - 0.5) * 6 * _zoomLvl,
                _shipY + 30 * _zoomLvl,
                (Math.random() - 0.5) * 40,
                25 + Math.random() * 45,
                0.4 + Math.random() * 0.4,
                2 + Math.random() * 3,
                255, 140 + Math.random() * 110 | 0, 30
            );
        }
    } else {
        ship.thrusting = false;
        setThrustSound(false);
    }

    if (leftKey()) landing.vx -= 100 * dt;
    if (rightKey()) landing.vx += 100 * dt;

    // Gravity
    landing.vy -= p.surfaceGravity * gameSettings.gravityMult * dt;

    // Atmospheric drag — caps terminal velocity so descent is manageable
    // Stronger drag near the surface (denser atmosphere)
    const dragFactor = p.atmosphere * 0.008 * clamp(1 - landing.y / landing.maxAlt, 0.1, 1);
    landing.vy -= landing.vy * dragFactor;

    // Apply velocity (substep collision for fast speeds)
    const steps = Math.max(1, Math.ceil(Math.abs(landing.vy * dt) / 20));
    const subDt = dt / steps;
    for (let s = 0; s < steps; s++) {
        landing.x += landing.vx * subDt;
        landing.y += landing.vy * subDt;

        // Terrain collision
        const terrainH = getTerrainHeight(landing.x, p);
        if (landing.y <= terrainH + 10) {
            landing.y = terrainH + 10;
            const impactSpeed = Math.abs(landing.vy);
            if (impactSpeed > gameSettings.crashThreshold) {
                // Crash! — big explosion then game over
                landing.resolved = true;
                landing.vy = 0;
                camera.shake = 50;
                playSound(60, 1.5, 'sawtooth', 0.3);
                playSound(40, 2.0, 'square', 0.2);
                playSound(100, 0.8, 'triangle', 0.15);
                // Big explosion particles
                for (let i = 0; i < 80; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const spd = 20 + Math.random() * 200;
                    const life = 0.6 + Math.random() * 1.2;
                    emitParticle(W / 2, H * 0.75,
                        Math.cos(a) * spd, Math.sin(a) * spd - 40,
                        life, 2 + Math.random() * 5,
                        255, 60 + Math.random() * 190 | 0, 10 + Math.random() * 40 | 0);
                }
                // Debris particles
                for (let i = 0; i < 30; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const spd = 30 + Math.random() * 100;
                    emitParticle(W / 2, H * 0.75,
                        Math.cos(a) * spd, Math.sin(a) * spd - 60,
                        1.0 + Math.random() * 1.5, 1 + Math.random() * 2,
                        180, 180, 190);
                }
                // Delayed game over
                const pName = p.name;
                setTimeout(() => {
                    gameOverMessage = 'Crashed on ' + pName + '!';
                    gameOverTimer = 0;
                    gameState = 'GAMEOVER';
                }, 1200);
            } else {
                // Successful landing!
                landing.resolved = true;
                landing.vy = 0;
                playSound(200, 0.2, 'sine', 0.15);
                playSound(150, 0.3, 'sine', 0.1);
                camera.shake = impactSpeed * 0.15;
                if (!p.discovered) {
                    p.discovered = true;
                    ship.discovered.add(p);
                }
                p.landed = true;
                setTimeout(() => changeState('SURFACE', { planet: p, landX: landing.x }), 800);
            }
            break;
        }
    }
    landing.vx *= 0.99;

    // Abort - fly back up high enough
    if (landing.y > landing.maxAlt + 200) {
        changeState('ORBIT', { fromLaunch: true, planet: p });
    }

    updateParticles(dt);
    if (justPressed('Tab')) showLog = !showLog;
}

function renderLanding(time) {
    const p = landing.planet;
    const skyC = p.type.skyColor || [0, 0, 0];
    const altPct = clamp(landing.y / landing.maxAlt, 0, 1); // 1=high, 0=ground
    const atmoFactor = clamp(1 - altPct, 0, 1);             // 0=space, 1=ground

    // Zoom effect: camera zooms in as you get closer to surface
    const zoomLevel = lerp(1.8, 1.0, altPct); // zoomed out at top, zoomed in near ground

    // === SKY ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    const sr = Math.floor(lerp(2, skyC[0], atmoFactor));
    const sg = Math.floor(lerp(2, skyC[1], atmoFactor));
    const sb = Math.floor(lerp(4, skyC[2], atmoFactor));
    skyGrad.addColorStop(0, `rgb(${sr >> 1},${sg >> 1},${sb >> 1})`);
    skyGrad.addColorStop(0.6, `rgb(${sr},${sg},${sb})`);
    skyGrad.addColorStop(1, `rgb(${Math.min(255,sr+15)},${Math.min(255,sg+10)},${Math.min(255,sb+8)})`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars (fade with atmosphere)
    const starAlpha = clamp(1 - atmoFactor * 1.8, 0, 1);
    if (starAlpha > 0) {
        ctx.globalAlpha = starAlpha;
        const rng = mulberry32(p.seed);
        for (let i = 0; i < 150; i++) {
            const bright = rng() * 0.9 + 0.1;
            const sz = rng() * 1.8 + 0.2;
            ctx.fillStyle = `rgba(255,255,255,${bright})`;
            ctx.beginPath();
            ctx.arc(rng() * W, rng() * H * 0.7, sz, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // === CURVED PLANET SURFACE ===
    // The planet appears as a huge curved horizon that flattens as you descend
    const planetVisualRadius = lerp(W * 0.8, W * 8, atmoFactor); // grows as you approach
    const horizonY = lerp(H * 0.92, H * 0.82, altPct);           // horizon position
    const planetCenterY = horizonY + planetVisualRadius;

    // Atmosphere haze ring above horizon
    if (p.atmosphere > 0.1) {
        const hazeH = lerp(60, 20, atmoFactor) * p.atmosphere;
        const hazeGrad = ctx.createLinearGradient(0, horizonY - hazeH, 0, horizonY + 10);
        const hazeR = Math.min(255, skyC[0] + 40);
        const hazeG = Math.min(255, skyC[1] + 30);
        const hazeB = Math.min(255, skyC[2] + 20);
        hazeGrad.addColorStop(0, `rgba(${hazeR},${hazeG},${hazeB},0)`);
        hazeGrad.addColorStop(0.7, `rgba(${hazeR},${hazeG},${hazeB},${p.atmosphere * 0.25})`);
        hazeGrad.addColorStop(1, `rgba(${hazeR},${hazeG},${hazeB},0)`);
        ctx.fillStyle = hazeGrad;
        ctx.fillRect(0, horizonY - hazeH, W, hazeH + 10);
    }

    // Draw curved planet body
    ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${Math.max(5, p.type.baseL - 12)}%)`;
    ctx.beginPath();
    ctx.arc(W / 2, planetCenterY, planetVisualRadius, 0, Math.PI * 2);
    ctx.fill();

    // Terrain detail on the curved surface
    const terrainAmp = lerp(2, 25, atmoFactor);
    ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${p.type.baseL}%)`;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let sx = -10; sx <= W + 10; sx += 3) {
        // Map screen x to angle on the planet circle
        const dx = sx - W / 2;
        const angOffset = dx / planetVisualRadius;
        const curveY = planetCenterY - Math.sqrt(Math.max(0, planetVisualRadius * planetVisualRadius - dx * dx));
        const worldX = landing.x + dx / zoomLevel;
        const th = getTerrainHeight(worldX, p) * terrainAmp / 150;
        ctx.lineTo(sx, curveY - th);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // Second terrain layer (detail)
    ctx.fillStyle = `hsl(${p.type.baseH}, ${Math.max(0,p.type.baseS - 5)}%, ${Math.max(5, p.type.baseL - 6)}%)`;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let sx = -10; sx <= W + 10; sx += 4) {
        const dx = sx - W / 2;
        const curveY = planetCenterY - Math.sqrt(Math.max(0, planetVisualRadius * planetVisualRadius - dx * dx));
        const worldX = landing.x + dx / zoomLevel + 300;
        const th = getTerrainHeight(worldX, p) * terrainAmp * 0.6 / 150;
        ctx.lineTo(sx, curveY - th + 3);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // === ATMOSPHERIC EFFECTS ===
    // Clouds for Lush planets
    if (p.type.name === 'Lush' && atmoFactor > 0.15) {
        const cloudAlpha = clamp(atmoFactor * 0.7, 0, 0.5);
        const rng2 = mulberry32(p.seed + 77);
        for (let i = 0; i < 12; i++) {
            const cx = ((rng2() * W * 2 - time * 8 * (0.5 + rng2())) % (W + 200)) - 100;
            const cy = lerp(H * 0.15, horizonY - 40, rng2());
            const cw = 80 + rng2() * 120;
            const ch = 20 + rng2() * 25;
            const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw * 0.5);
            cGrad.addColorStop(0, `rgba(240,245,255,${cloudAlpha})`);
            cGrad.addColorStop(0.6, `rgba(220,230,245,${cloudAlpha * 0.5})`);
            cGrad.addColorStop(1, `rgba(200,210,230,0)`);
            ctx.fillStyle = cGrad;
            ctx.beginPath();
            ctx.ellipse(cx, cy, cw * 0.5, ch * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Ice crystal shimmer
    if (p.type.name === 'Ice' && atmoFactor > 0.1) {
        const rng3 = mulberry32(Math.floor(time * 3) + p.seed);
        for (let i = 0; i < 40 * atmoFactor; i++) {
            const ix = rng3() * W;
            const iy = rng3() * H;
            const bright = 0.3 + rng3() * 0.5;
            ctx.fillStyle = `rgba(200,220,255,${bright * atmoFactor})`;
            ctx.beginPath();
            ctx.arc(ix, iy, rng3() * 1.5 + 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Volcanic ash and heat shimmer
    if (p.type.name === 'Volcanic' && atmoFactor > 0.2) {
        // Lava glow on horizon
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const lavaGrad = ctx.createRadialGradient(W / 2, horizonY, 0, W / 2, horizonY, W * 0.4);
        lavaGrad.addColorStop(0, `rgba(255,80,0,${atmoFactor * 0.15})`);
        lavaGrad.addColorStop(0.5, `rgba(255,40,0,${atmoFactor * 0.06})`);
        lavaGrad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = lavaGrad;
        ctx.fillRect(0, horizonY - 100, W, 200);
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();
        // Ash particles
        const rng4 = mulberry32(Math.floor(time * 4) + p.seed);
        for (let i = 0; i < 25 * atmoFactor; i++) {
            ctx.fillStyle = `rgba(100,60,40,${rng4() * 0.4})`;
            ctx.beginPath();
            ctx.arc(rng4() * W, rng4() * H, rng4() * 2 + 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Rocky dust haze
    if (p.type.name === 'Rocky' && atmoFactor > 0.3) {
        const dustGrad = ctx.createLinearGradient(0, horizonY - 30, 0, horizonY + 20);
        dustGrad.addColorStop(0, `rgba(180,140,80,0)`);
        dustGrad.addColorStop(0.5, `rgba(180,140,80,${atmoFactor * 0.12})`);
        dustGrad.addColorStop(1, `rgba(180,140,80,0)`);
        ctx.fillStyle = dustGrad;
        ctx.fillRect(0, horizonY - 30, W, 50);
    }

    // === SHIP (blend between high-alt fixed position and terrain-relative) ===
    const terrainHAtShip = getTerrainHeight(landing.x, p);
    // Terrain surface screen Y at center (dx=0 on curved planet)
    const terrainSurfaceScreenY = horizonY - terrainAmp * terrainHAtShip / 150;
    const shipScale = zoomLevel;
    // High altitude: ship sits near top of screen, terrain far below
    const highAltShipY = H * 0.22;
    // Low altitude: ship legs touch terrain (account for scale — legs are at y=18 in local)
    const lowAltShipY = terrainSurfaceScreenY - 18 * shipScale;
    // Blend based on HEIGHT ABOVE TERRAIN (not absolute altitude) so ship sits on terrain at landing
    const heightAboveTerrain = Math.max(0, landing.y - terrainHAtShip);
    const normalizedHeight = clamp(heightAboveTerrain / (landing.maxAlt * 0.8), 0, 1);
    const posBlend = smoothstep(clamp(normalizedHeight * 2.0, 0, 1));
    const shipSX = W / 2;
    const shipSY = clamp(lerp(lowAltShipY, highAltShipY, posBlend), H * 0.08, H * 0.88);

    ctx.save();
    ctx.translate(shipSX, shipSY);
    ctx.scale(shipScale, shipScale);

    // Thrust flame (BELOW ship, aligned to bottom)
    if (ship.thrusting) {
        const flicker = 0.7 + Math.random() * 0.3;
        // Outer flame
        ctx.fillStyle = `rgba(255,100,10,${flicker * 0.7})`;
        ctx.beginPath();
        ctx.moveTo(-6, 14);
        ctx.lineTo(0, 34 + Math.random() * 18);
        ctx.lineTo(6, 14);
        ctx.closePath();
        ctx.fill();
        // Inner flame (brighter)
        ctx.fillStyle = `rgba(255,200,80,${flicker})`;
        ctx.beginPath();
        ctx.moveTo(-3, 14);
        ctx.lineTo(0, 24 + Math.random() * 10);
        ctx.lineTo(3, 14);
        ctx.closePath();
        ctx.fill();
        // Engine glow
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const eGlow = ctx.createRadialGradient(0, 18, 0, 0, 18, 20);
        eGlow.addColorStop(0, `rgba(255,150,50,${flicker * 0.3})`);
        eGlow.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = eGlow;
        ctx.beginPath();
        ctx.arc(0, 18, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();
    }

    // Ship body
    ctx.fillStyle = '#D0D4DC';
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.quadraticCurveTo(-9, -4, -8, 6);
    ctx.lineTo(-6, 12);
    ctx.lineTo(6, 12);
    ctx.lineTo(8, 6);
    ctx.quadraticCurveTo(9, -4, 0, -18);
    ctx.closePath();
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(-1, -16);
    ctx.quadraticCurveTo(-6, -2, -5, 8);
    ctx.lineTo(-2, 8);
    ctx.quadraticCurveTo(-3, -2, -1, -16);
    ctx.closePath();
    ctx.fill();

    // Cockpit window
    ctx.fillStyle = '#5588BB';
    ctx.beginPath();
    ctx.ellipse(0, -7, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(-1, -8, 2, 3, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // Landing legs
    ctx.strokeStyle = '#8899AA';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, 12); ctx.lineTo(-11, 18);
    ctx.moveTo(6, 12); ctx.lineTo(11, 18);
    ctx.stroke();
    // Leg pads
    ctx.strokeStyle = '#778899';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-13, 18); ctx.lineTo(-9, 18);
    ctx.moveTo(9, 18); ctx.lineTo(13, 18);
    ctx.stroke();

    ctx.restore();

    // Particles
    renderParticlesScreen();

    // === HUD ===
    ctx.textAlign = 'center';
    ctx.font = '14px "Courier New", monospace';
    ctx.fillStyle = 'rgba(170,187,204,0.9)';
    ctx.fillText(`ALT: ${Math.max(0, landing.y).toFixed(0)}m`, W / 2, 30);
    ctx.fillText(`V-SPEED: ${landing.vy.toFixed(1)} m/s`, W / 2, 50);

    const fuelPct = ship.fuel / gameSettings.fuelMax;
    ctx.fillStyle = fuelPct > 0.3 ? '#4C6' : fuelPct > 0.1 ? '#CA4' : '#C44';
    ctx.fillText(`FUEL: ${(fuelPct * 100).toFixed(0)}%`, W / 2, 70);

    // Speed warning
    if (landing.vy < -60 && landing.y < 400) {
        ctx.fillStyle = `rgba(255,50,50,${0.5 + 0.5 * Math.sin(time * 8)})`;
        ctx.font = 'bold 20px "Courier New", monospace';
        ctx.fillText('!! TOO FAST !!', W / 2, H * 0.35);
    }

    if (showLog) renderDiscoveryLog();
}

// ==========================================
//  STATE: SURFACE
// ==========================================
function updateSurface(dt) {
    stateTime += dt;
    const p = surface.planet;
    const circ = p.circumference;
    const moveSpeed = 200;
    const jumpForce = p.gravity < 0.5 ? 120 : 90 / p.gravity;

    // Horizontal movement
    if (leftKey()) {
        surface.playerVX -= moveSpeed * dt * 5;
        surface.facingRight = false;
    }
    if (rightKey()) {
        surface.playerVX += moveSpeed * dt * 5;
        surface.facingRight = true;
    }
    surface.playerVX *= Math.exp(-8 * dt);

    // Jump
    if ((justPressed('Space') || justPressed('KeyW') || justPressed('ArrowUp')) && surface.onGround) {
        surface.playerVY = jumpForce;
        surface.onGround = false;
        playSound(300, 0.15, 'sine', 0.1);
    }

    // Gravity
    surface.playerVY -= p.surfaceGravity * gameSettings.gravityMult * dt;

    // Move and wrap around planet
    surface.playerX += surface.playerVX * dt;
    surface.playerY += surface.playerVY * dt;
    surface.playerX = wrapX(surface.playerX, circ);

    // Terrain collision
    const terrainH = getTerrainHeight(surface.playerX, p);
    if (surface.playerY <= terrainH) {
        surface.playerY = terrainH;
        surface.playerVY = 0;
        surface.onGround = true;
    }

    // Collect resources (with wrapped distance)
    for (const res of p.resources) {
        if (res.collected) continue;
        const rd = Math.abs(wrappedDelta(surface.playerX, res.x, circ));
        if (rd < 25) {
            res.collected = true;
            if (res.type === 'fuel') {
                ship.fuel = Math.min(gameSettings.fuelMax, ship.fuel + 12);
                playSound(600, 0.2, 'sine', 0.15);
                playSound(900, 0.15, 'sine', 0.1);
            } else {
                ship.minerals++;
                playSound(800, 0.2, 'triangle', 0.12);
                playSound(1000, 0.15, 'sine', 0.08);
            }
            for (let i = 0; i < 12; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = Math.random() * 90;
                const cr = res.type === 'fuel' ? 80 : 180;
                const cg = res.type === 'fuel' ? 255 : 130;
                const cb = res.type === 'fuel' ? 80 : 255;
                emitParticle(W / 2, H * 0.55, Math.cos(a) * s, Math.sin(a) * s,
                    0.5 + Math.random() * 0.4, 2 + Math.random() * 2, cr, cg, cb);
            }
        }
    }

    // Launch - return to ship and press E → go to LAUNCH state
    if (interactKey()) {
        const shipDist = Math.abs(wrappedDelta(surface.playerX, surface.shipX, circ));
        if (shipDist < 35) {
            playSound(200, 0.5, 'sine', 0.2);
            changeState('LAUNCH', { planet: p, shipX: surface.shipX });
        }
    }

    if (justPressed('Tab')) showLog = !showLog;
    updateParticles(dt);

    // Ambient particles
    if (p.type.name === 'Rocky' || p.type.name === 'Volcanic') {
        if (Math.random() < 0.15) {
            emitParticle(Math.random() * W, H * 0.4 + Math.random() * H * 0.3,
                -20 + Math.random() * 10, -5 + Math.random() * 3,
                1.2 + Math.random(), 1 + Math.random(), 180, 160, 140);
        }
    }
    if (p.type.name === 'Ice') {
        if (Math.random() < 0.25) {
            emitParticle(Math.random() * W, Math.random() * H * 0.6,
                -8 + Math.random() * 4, 8 + Math.random() * 10,
                1.5 + Math.random(), 1 + Math.random() * 1.5, 220, 230, 255);
        }
    }
}

// Helper: get screen position for world coords on curved surface
function surfaceWorldToScreen(worldX, heightAboveTerrain, camWorldX, groundY, viewScale, planetRadius, planet) {
    const circ = planet.circumference;
    const dx = wrappedDelta(camWorldX, worldX, circ) * viewScale;
    const screenX = W / 2 + dx;
    const curveOffset = (dx * dx) / (2 * planetRadius);
    const th = getTerrainHeight(worldX, planet);
    const screenY = groundY + curveOffset - (th + heightAboveTerrain) / viewScale;
    return { x: screenX, y: screenY };
}

function renderSurface(time) {
    const p = surface.planet;
    const skyC = p.type.skyColor || [0, 0, 0];

    // === SKY ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, `rgb(${skyC[0] >> 1},${skyC[1] >> 1},${skyC[2] >> 1})`);
    skyGrad.addColorStop(0.4, `rgb(${skyC[0]},${skyC[1]},${skyC[2]})`);
    skyGrad.addColorStop(1, `rgb(${Math.min(255, skyC[0] + 25)},${Math.min(255, skyC[1] + 18)},${Math.min(255, skyC[2] + 12)})`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    if (p.atmosphere < 0.5) {
        const starAlpha = clamp(1 - p.atmosphere * 2, 0, 1);
        ctx.globalAlpha = starAlpha;
        const rng = mulberry32(p.seed + 500);
        for (let i = 0; i < 120; i++) {
            const bright = rng() * 0.8 + 0.1;
            ctx.fillStyle = `rgba(255,255,255,${bright})`;
            ctx.beginPath();
            ctx.arc(rng() * W, rng() * H * 0.4, rng() * 1.5 + 0.2, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // === PLANET CURVATURE ===
    const groundY = H * 0.65;
    const viewScale = 2.2;
    const planetRadius = W * 3; // visual curvature radius

    // Distant mountains (background parallax layer) — also curved
    ctx.fillStyle = `hsl(${p.type.baseH}, ${Math.max(0, p.type.baseS - 15)}%, ${Math.max(5, p.type.baseL - 20)}%)`;
    ctx.beginPath();
    ctx.moveTo(-10, H);
    for (let sx = -10; sx <= W + 10; sx += 5) {
        const worldX = surface.playerX * 0.1 + sx * 2;
        const dx = sx - W / 2;
        const curve = (dx * dx) / (2 * planetRadius * 0.6);
        const h = fbm(worldX * 0.001 + p.seed, 3, p.seed + 300) * 150 + 50;
        ctx.lineTo(sx, H * 0.45 + curve - h * 0.3);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // Mid-ground hills (curved)
    ctx.fillStyle = `hsl(${p.type.baseH}, ${Math.max(0, p.type.baseS - 8)}%, ${Math.max(5, p.type.baseL - 12)}%)`;
    ctx.beginPath();
    ctx.moveTo(-10, H);
    for (let sx = -10; sx <= W + 10; sx += 4) {
        const worldX = surface.playerX * 0.3 + sx * 1.5;
        const dx = sx - W / 2;
        const curve = (dx * dx) / (2 * planetRadius * 0.8);
        const h = fbm(worldX * 0.002 + p.seed + 100, 3, p.seed + 400) * 100 + 30;
        ctx.lineTo(sx, H * 0.55 + curve - h * 0.2);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // === FOREGROUND TERRAIN (curved) ===
    ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${p.type.baseL}%)`;
    ctx.beginPath();
    ctx.moveTo(-10, H);
    for (let sx = -10; sx <= W + 10; sx += 3) {
        const worldX = wrapX(surface.playerX + (sx - W / 2) / viewScale, p.circumference);
        const dx = sx - W / 2;
        const curve = (dx * dx) / (2 * planetRadius);
        const th = getTerrainHeight(worldX, p);
        ctx.lineTo(sx, groundY + curve - th / viewScale);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // Terrain detail stripe (darker, for depth)
    ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${Math.max(5, p.type.baseL - 7)}%)`;
    ctx.beginPath();
    ctx.moveTo(-10, H);
    for (let sx = -10; sx <= W + 10; sx += 3) {
        const worldX = wrapX(surface.playerX + (sx - W / 2) / viewScale, p.circumference);
        const dx = sx - W / 2;
        const curve = (dx * dx) / (2 * planetRadius);
        const th = getTerrainHeight(worldX, p);
        ctx.lineTo(sx, groundY + curve - th / viewScale + 5);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // === ATMOSPHERIC EFFECTS (surface level) ===
    // Lush: clouds drifting across sky
    if (p.type.name === 'Lush') {
        const rng2 = mulberry32(p.seed + 77);
        for (let i = 0; i < 8; i++) {
            const cx = ((rng2() * W * 2.5 - time * 6 * (0.4 + rng2() * 0.6)) % (W + 300)) - 150;
            const cy = H * 0.08 + rng2() * H * 0.25;
            const cw = 100 + rng2() * 160;
            const ch = 25 + rng2() * 30;
            const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw * 0.5);
            cGrad.addColorStop(0, 'rgba(240,248,255,0.35)');
            cGrad.addColorStop(0.6, 'rgba(225,235,245,0.15)');
            cGrad.addColorStop(1, 'rgba(210,220,235,0)');
            ctx.fillStyle = cGrad;
            ctx.beginPath();
            ctx.ellipse(cx, cy, cw * 0.5, ch * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Volcanic: lava glow on horizon + embers
    if (p.type.name === 'Volcanic') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const lavaGlow = ctx.createLinearGradient(0, groundY - 20, 0, groundY + 40);
        lavaGlow.addColorStop(0, 'rgba(255,60,0,0)');
        lavaGlow.addColorStop(0.5, 'rgba(255,50,0,0.08)');
        lavaGlow.addColorStop(1, 'rgba(200,30,0,0)');
        ctx.fillStyle = lavaGlow;
        ctx.fillRect(0, groundY - 20, W, 60);
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();
    }

    // Ice: gentle snow
    if (p.type.name === 'Ice') {
        const rng3 = mulberry32(Math.floor(time * 2.5) + p.seed);
        for (let i = 0; i < 50; i++) {
            const sx = ((rng3() * W + time * 12) % W);
            const sy = ((rng3() * H * 0.8 + time * 18 * (0.5 + rng3())) % (H * 0.8));
            ctx.fillStyle = `rgba(220,235,255,${0.3 + rng3() * 0.5})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 1 + rng3() * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Rocky: distant dust haze
    if (p.type.name === 'Rocky') {
        const dustGrad = ctx.createLinearGradient(0, groundY - 40, 0, groundY + 10);
        dustGrad.addColorStop(0, 'rgba(180,140,80,0)');
        dustGrad.addColorStop(0.6, 'rgba(180,140,80,0.08)');
        dustGrad.addColorStop(1, 'rgba(160,120,60,0)');
        ctx.fillStyle = dustGrad;
        ctx.fillRect(0, groundY - 40, W, 50);
    }

    // === RESOURCES (using shared coordinate function) ===
    for (const res of p.resources) {
        if (res.collected) continue;
        const pos = surfaceWorldToScreen(res.x, 10 - Math.sin(time * 3 + res.bobOffset) * 4, surface.playerX, groundY, viewScale, planetRadius, p);
        if (pos.x < -30 || pos.x > W + 30) continue;

        // Glow
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const gc = res.type === 'fuel' ? 'rgba(80,255,80,' : 'rgba(140,80,255,';
        const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 24);
        glow.addColorStop(0, gc + '0.35)');
        glow.addColorStop(1, gc + '0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 24, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();

        // Icon
        if (res.type === 'fuel') {
            ctx.fillStyle = '#55EE55';
            ctx.fillRect(pos.x - 4, pos.y - 6, 8, 12);
            ctx.fillStyle = '#33CC33';
            ctx.fillRect(pos.x - 2, pos.y - 8, 4, 3);
        } else {
            ctx.fillStyle = '#AA88FF';
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y - 9);
            ctx.lineTo(pos.x + 6, pos.y);
            ctx.lineTo(pos.x, pos.y + 6);
            ctx.lineTo(pos.x - 6, pos.y);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(200,170,255,0.5)';
            ctx.beginPath();
            ctx.moveTo(pos.x - 1, pos.y - 7);
            ctx.lineTo(pos.x + 3, pos.y - 1);
            ctx.lineTo(pos.x - 1, pos.y + 3);
            ctx.lineTo(pos.x - 4, pos.y - 1);
            ctx.closePath();
            ctx.fill();
        }
    }

    // === SHIP ON SURFACE (using shared coordinate function) ===
    const shipPos = surfaceWorldToScreen(surface.shipX, 0, surface.playerX, groundY, viewScale, planetRadius, p);
    if (shipPos.x > -60 && shipPos.x < W + 60) {
        ctx.save();
        ctx.translate(shipPos.x, shipPos.y);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(0, 3, 16, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Ship body
        ctx.fillStyle = '#D0D4DC';
        ctx.beginPath();
        ctx.moveTo(0, -32);
        ctx.quadraticCurveTo(-10, -6, -9, 0);
        ctx.lineTo(-7, 2);
        ctx.lineTo(7, 2);
        ctx.lineTo(9, 0);
        ctx.quadraticCurveTo(10, -6, 0, -32);
        ctx.closePath();
        ctx.fill();
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath();
        ctx.moveTo(-1, -28);
        ctx.quadraticCurveTo(-7, -4, -6, 0);
        ctx.lineTo(-3, 0);
        ctx.quadraticCurveTo(-4, -4, -1, -28);
        ctx.closePath();
        ctx.fill();

        // Cockpit
        ctx.fillStyle = '#5588BB';
        ctx.beginPath();
        ctx.ellipse(0, -18, 5, 5.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Legs
        ctx.strokeStyle = '#8899AA';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-7, 2); ctx.lineTo(-12, 7);
        ctx.moveTo(7, 2); ctx.lineTo(12, 7);
        ctx.stroke();

        ctx.restore();

        // Launch prompt
        if (Math.abs(wrappedDelta(surface.playerX, surface.shipX, p.circumference)) < 35) {
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(150,200,255,0.85)';
            ctx.font = '14px "Courier New", monospace';
            ctx.fillText('[ Press E to launch ]', shipPos.x, shipPos.y - 48);
        }
    }

    // === PLAYER ASTRONAUT (using shared coordinate function) ===
    // Pass height ABOVE terrain, not absolute Y (fixes floating player)
    const playerTerrainH = getTerrainHeight(surface.playerX, p);
    const playerAbove = Math.max(0, surface.playerY - playerTerrainH);
    const playerPos = surfaceWorldToScreen(surface.playerX, playerAbove, surface.playerX, groundY, viewScale, planetRadius, p);

    ctx.save();
    ctx.translate(playerPos.x, playerPos.y);
    const dir = surface.facingRight ? 1 : -1;
    ctx.scale(dir, 1);

    // Helmet
    ctx.fillStyle = '#EEEEF2';
    ctx.beginPath();
    ctx.arc(0, -22, 7, 0, Math.PI * 2);
    ctx.fill();
    // Visor
    ctx.fillStyle = '#4488CC';
    ctx.beginPath();
    ctx.arc(2.5, -22, 4, -0.6, 1.3);
    ctx.fill();
    ctx.fillStyle = 'rgba(100,180,255,0.25)';
    ctx.beginPath();
    ctx.arc(1, -23, 2, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#E0E0E4';
    ctx.fillRect(-5, -15, 10, 13);
    // Backpack
    ctx.fillStyle = '#A0A4AA';
    ctx.fillRect(-7, -14, 3, 10);

    // Legs
    const walkCycle = Math.sin(time * 10) * (Math.abs(surface.playerVX) > 5 ? 5 : 0);
    ctx.strokeStyle = '#D0D0DD';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-2, -2); ctx.lineTo(-3 + walkCycle, 7);
    ctx.moveTo(2, -2); ctx.lineTo(3 - walkCycle, 7);
    ctx.stroke();

    // Arms
    const armSwing = Math.sin(time * 10 + Math.PI) * (Math.abs(surface.playerVX) > 5 ? 3.5 : 0);
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(4, -13); ctx.lineTo(9 + armSwing, -7);
    ctx.moveTo(-4, -13); ctx.lineTo(-5 - armSwing, -7);
    ctx.stroke();
    ctx.lineCap = 'butt';

    ctx.restore();

    // Particles
    renderParticlesScreen();

    // === HUD ===
    ctx.textAlign = 'left';
    ctx.font = '13px "Courier New", monospace';

    const pad = 20;
    const barW = 160, barH = 12;
    const fuelPct = ship.fuel / gameSettings.fuelMax;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(pad, pad, barW, barH);
    const fuelColor = fuelPct > 0.3 ? '#44CC66' : fuelPct > 0.1 ? '#CCAA44' : '#CC4444';
    ctx.fillStyle = fuelColor;
    ctx.fillRect(pad, pad, barW * fuelPct, barH);
    ctx.strokeStyle = 'rgba(150,180,200,0.5)';
    ctx.strokeRect(pad, pad, barW, barH);
    ctx.fillStyle = '#AAC';
    ctx.fillText(`FUEL ${(fuelPct * 100).toFixed(0)}%`, pad, pad + barH + 4);
    ctx.fillText(`MINERALS ${ship.minerals}`, pad, pad + barH + 22);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#8899AA';
    ctx.fillText(p.name, W - pad, pad);
    ctx.fillText(`Type: ${p.type.name}`, W - pad, pad + 18);
    ctx.fillText(`Gravity: ${p.gravity.toFixed(1)}x`, W - pad, pad + 36);

    const collected = p.resources.filter(r => r.collected).length;
    ctx.fillText(`Resources: ${collected} / ${p.resources.length}`, W - pad, pad + 54);

    const sDelta = wrappedDelta(surface.playerX, surface.shipX, p.circumference);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#667788';
    ctx.fillText(`Ship: ${Math.abs(sDelta).toFixed(0)}m ${sDelta > 0 ? '\u25B6' : '\u25C0'}`, W / 2, H - pad - 10);

    if (showLog) renderDiscoveryLog();
}

// ==========================================
//  STATE: LAUNCH
// ==========================================
function updateLaunch(dt) {
    stateTime += dt;
    const p = launch.planet;
    launch.timer += dt;

    if (launch.resolved) {
        ship.thrusting = false;
        setThrustSound(false);
        updateParticles(dt);
        return;
    }

    // Countdown phase
    if (launch.countdownActive) {
        launch.countdown -= dt;
        // Smoke particles during countdown
        const _scAlt = clamp(launch.y / landing.maxAlt, 0, 1);
        const _scAtmo = clamp(1 - _scAlt, 0, 1);
        const _scZoom = lerp(1.8, 1.0, _scAlt);
        const _scHorizon = lerp(H * 0.92, H * 0.82, _scAlt);
        const _scTAmp = lerp(2, 25, _scAtmo);
        const _scTH = getTerrainHeight(launch.x, p);
        const _scTerrY = _scHorizon - _scTAmp * _scTH / 150;
        const _scLowY = _scTerrY - 18 * _scZoom;
        const _scShipY = clamp(_scLowY, H * 0.08, H * 0.88);
        for (let i = 0; i < 4; i++) {
            const smokeAngle = Math.random() * Math.PI * 2;
            const smokeSpd = 15 + Math.random() * 30;
            const grey = 160 + Math.floor(Math.random() * 80);
            emitParticle(
                W / 2 + (Math.random() - 0.5) * 12,
                _scShipY + 20 * _scZoom,
                Math.cos(smokeAngle) * smokeSpd,
                Math.abs(Math.sin(smokeAngle)) * smokeSpd * 0.5 + 5,
                1.0 + Math.random() * 1.5,
                5 + Math.random() * 7,
                grey, grey, grey
            );
        }
        // Subtle camera shake
        camera.shake = Math.max(camera.shake, 1.5);
        ship.thrusting = false;
        setThrustSound(false);
        if (launch.countdown <= 0) {
            launch.countdownActive = false;
            playSound(120, 0.8, 'sawtooth', 0.2);
            playSound(80, 1.2, 'square', 0.15);
        }
        updateParticles(dt);
        if (justPressed('Tab')) showLog = !showLog;
        return;
    }

    // Auto-thrust upward
    launch.vy += LANDING_THRUST * 1.2 * dt;
    launch.vy -= p.surfaceGravity * gameSettings.gravityMult * dt;
    launch.y += launch.vy * dt;
    ship.fuel -= FUEL_BURN_RATE * dt;
    ship.fuel = Math.max(0, ship.fuel);
    ship.thrusting = true;
    setThrustSound(true);

    // Exhaust particles — compute ship screen Y using terrain-relative blend
    const _altPctL = clamp(launch.y / landing.maxAlt, 0, 1);
    const _atmoFL = clamp(1 - _altPctL, 0, 1);
    const _zoomLvlL = lerp(1.8, 1.0, _altPctL);
    const _horizYL = lerp(H * 0.92, H * 0.82, _altPctL);
    const _tAmpL = lerp(2, 25, _atmoFL);
    const _tHL = getTerrainHeight(launch.x, launch.planet);
    const _terrScrYL = _horizYL - _tAmpL * _tHL / 150;
    const _lowYL = _terrScrYL - 18 * _zoomLvlL;
    const _highYL = H * 0.22;
    const _hAboveL = Math.max(0, launch.y - _tHL);
    const _normHL = clamp(_hAboveL / (landing.maxAlt * 0.8), 0, 1);
    const _blendL = smoothstep(clamp(_normHL * 2.0, 0, 1));
    const shipScrY = clamp(lerp(_lowYL, _highYL, _blendL), H * 0.08, H * 0.88);
    for (let i = 0; i < 3; i++) {
        emitParticle(
            W / 2 + (Math.random() - 0.5) * 8,
            shipScrY + 25,
            (Math.random() - 0.5) * 40,
            25 + Math.random() * 40,
            0.4 + Math.random() * 0.4, 2 + Math.random() * 3,
            255, 140 + Math.random() * 110 | 0, 30
        );
    }

    // Transition to orbit when high enough
    if (launch.y > landing.maxAlt * 0.9) {
        launch.resolved = true;
        ship.thrusting = false;
        setThrustSound(false);
        changeState('ORBIT', { fromLaunch: true, planet: p });
    }

    updateParticles(dt);
    if (justPressed('Tab')) showLog = !showLog;
}

function renderLaunch(time) {
    const p = launch.planet;
    const skyC = p.type.skyColor || [0, 0, 0];
    const altPct = clamp(launch.y / landing.maxAlt, 0, 1);
    const atmoFactor = clamp(1 - altPct, 0, 1);

    // Sky (fading to black as we ascend)
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    const sr = Math.floor(lerp(2, skyC[0], atmoFactor));
    const sg = Math.floor(lerp(2, skyC[1], atmoFactor));
    const sb = Math.floor(lerp(4, skyC[2], atmoFactor));
    skyGrad.addColorStop(0, `rgb(${sr >> 1},${sg >> 1},${sb >> 1})`);
    skyGrad.addColorStop(0.6, `rgb(${sr},${sg},${sb})`);
    skyGrad.addColorStop(1, `rgb(${Math.min(255,sr+15)},${Math.min(255,sg+10)},${Math.min(255,sb+8)})`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars appearing
    const starAlpha = clamp(1 - atmoFactor * 1.8, 0, 1);
    if (starAlpha > 0) {
        ctx.globalAlpha = starAlpha;
        const rng = mulberry32(p.seed);
        for (let i = 0; i < 150; i++) {
            ctx.fillStyle = `rgba(255,255,255,${rng() * 0.9 + 0.1})`;
            ctx.beginPath();
            ctx.arc(rng() * W, rng() * H * 0.7, rng() * 1.8 + 0.2, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // Planet shrinking below
    const planetVisualRadius = lerp(W * 0.8, W * 8, atmoFactor);
    const horizonY = lerp(H * 0.92, H * 0.82, altPct);
    const planetCenterY = horizonY + planetVisualRadius;

    // Planet body
    ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${Math.max(5, p.type.baseL - 12)}%)`;
    ctx.beginPath();
    ctx.arc(W / 2, planetCenterY, planetVisualRadius, 0, Math.PI * 2);
    ctx.fill();

    // Terrain detail
    const terrainAmp = lerp(2, 25, atmoFactor);
    ctx.fillStyle = `hsl(${p.type.baseH}, ${p.type.baseS}%, ${p.type.baseL}%)`;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let sx = -10; sx <= W + 10; sx += 3) {
        const dx = sx - W / 2;
        const curveY = planetCenterY - Math.sqrt(Math.max(0, planetVisualRadius * planetVisualRadius - dx * dx));
        const worldX = launch.x + dx / (lerp(1.8, 1.0, altPct));
        const th = getTerrainHeight(worldX, p) * terrainAmp / 150;
        ctx.lineTo(sx, curveY - th);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();
    ctx.fill();

    // Atmosphere haze
    if (p.atmosphere > 0.1) {
        const hazeH = lerp(60, 20, atmoFactor) * p.atmosphere;
        const hazeGrad = ctx.createLinearGradient(0, horizonY - hazeH, 0, horizonY + 10);
        hazeGrad.addColorStop(0, `rgba(${Math.min(255,skyC[0]+40)},${Math.min(255,skyC[1]+30)},${Math.min(255,skyC[2]+20)},0)`);
        hazeGrad.addColorStop(0.7, `rgba(${Math.min(255,skyC[0]+40)},${Math.min(255,skyC[1]+30)},${Math.min(255,skyC[2]+20)},${p.atmosphere * 0.25})`);
        hazeGrad.addColorStop(1, `rgba(${Math.min(255,skyC[0]+40)},${Math.min(255,skyC[1]+30)},${Math.min(255,skyC[2]+20)},0)`);
        ctx.fillStyle = hazeGrad;
        ctx.fillRect(0, horizonY - hazeH, W, hazeH + 10);
    }

    // Ship (ascending) — terrain-relative blend like landing renderer
    const shipScale = lerp(1.8, 1.0, altPct);
    const terrainHAtShipL = getTerrainHeight(launch.x, p);
    const terrainSurfaceScreenYL = horizonY - terrainAmp * terrainHAtShipL / 150;
    const lowAltShipYL = terrainSurfaceScreenYL - 18 * shipScale;
    const highAltShipYL = H * 0.22;
    const heightAboveTerrainL = Math.max(0, launch.y - terrainHAtShipL);
    const normHL = clamp(heightAboveTerrainL / (landing.maxAlt * 0.8), 0, 1);
    const posBlendL = smoothstep(clamp(normHL * 2.0, 0, 1));
    const shipSY = clamp(lerp(lowAltShipYL, highAltShipYL, posBlendL), H * 0.08, H * 0.88);
    ctx.save();
    ctx.translate(W / 2, shipSY);
    ctx.scale(shipScale, shipScale);

    // Flame (only after countdown)
    if (!launch.countdownActive) {
        const flicker = 0.7 + Math.random() * 0.3;
        ctx.fillStyle = `rgba(255,100,10,${flicker * 0.7})`;
        ctx.beginPath();
        ctx.moveTo(-6, 14); ctx.lineTo(0, 38 + Math.random() * 20); ctx.lineTo(6, 14);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = `rgba(255,200,80,${flicker})`;
        ctx.beginPath();
        ctx.moveTo(-3, 14); ctx.lineTo(0, 26 + Math.random() * 12); ctx.lineTo(3, 14);
        ctx.closePath(); ctx.fill();
    }

    // Ship body
    ctx.fillStyle = '#D0D4DC';
    ctx.beginPath();
    ctx.moveTo(0, -18); ctx.quadraticCurveTo(-9, -4, -8, 6);
    ctx.lineTo(-6, 12); ctx.lineTo(6, 12); ctx.lineTo(8, 6);
    ctx.quadraticCurveTo(9, -4, 0, -18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#5588BB';
    ctx.beginPath(); ctx.ellipse(0, -7, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    renderParticlesScreen();

    // HUD
    ctx.textAlign = 'center'; ctx.font = '14px "Courier New", monospace';
    ctx.fillStyle = '#AAC';
    ctx.fillText(`ALT: ${Math.max(0, launch.y).toFixed(0)}m`, W / 2, 30);
    ctx.fillText(`V-SPEED: ${launch.vy.toFixed(1)} m/s`, W / 2, 50);
    const fuelPct = ship.fuel / gameSettings.fuelMax;
    ctx.fillStyle = fuelPct > 0.3 ? '#4C6' : fuelPct > 0.1 ? '#CA4' : '#C44';
    ctx.fillText(`FUEL: ${(fuelPct * 100).toFixed(0)}%`, W / 2, 70);

    // Countdown / Liftoff display
    if (launch.countdownActive) {
        const num = Math.ceil(launch.countdown);
        const pulse = 1.0 + 0.3 * Math.sin(gameTime * 12);
        const fontSize = Math.min(W * 0.12, 100) * pulse;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#FF8800';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#FFFFFF';
        ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
        ctx.fillText(String(Math.max(1, num)), W / 2, H * 0.38);
        ctx.shadowBlur = 0;
    } else if (launch.timer < 2) {
        const liftoffAlpha = clamp(1 - launch.timer / 2, 0, 1);
        const liftPulse = 1.0 + 0.15 * Math.sin(gameTime * 8);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#FF6600';
        ctx.shadowBlur = 15;
        ctx.fillStyle = `rgba(255,220,150,${liftoffAlpha})`;
        ctx.font = `bold ${Math.min(W * 0.06, 48) * liftPulse}px 'Courier New', monospace`;
        ctx.fillText('LIFTOFF', W / 2, H * 0.38);
        ctx.shadowBlur = 0;
    }

    if (showLog) renderDiscoveryLog();
}

// ==========================================
//  VICTORY
// ==========================================
function updateVictory(dt) {
    victoryTimer += dt;
    updateParticles(dt);
    updateCamera(ship.x, ship.y, dt);
    updatePlanets(dt);

    // Celebration particles
    if (victoryTimer < 6 && Math.random() < 0.4) {
        const sx = ship.x + (Math.random() - 0.5) * 200;
        const sy = ship.y + (Math.random() - 0.5) * 200;
        const colors = [[255,215,0],[100,255,100],[100,150,255],[255,100,200]];
        const c = colors[Math.floor(Math.random() * colors.length)];
        emitParticle(sx, sy, (Math.random()-0.5)*80, (Math.random()-0.5)*80,
            0.8+Math.random()*0.8, 2+Math.random()*3, c[0], c[1], c[2]);
    }

    // Auto-return to title after 10 seconds
    if (victoryTimer > 10) {
        victoryTriggered = false;
        particles.length = 0;
        systemSeed = Date.now();
        changeState('TITLE');
    }
}

function renderVictory(time) {
    // Render orbit as background
    renderOrbit(time);

    // Overlay
    const fade = clamp(victoryTimer * 0.5, 0, 0.75);
    ctx.fillStyle = `rgba(0,0,10,${fade})`;
    ctx.fillRect(0, 0, W, H);

    if (victoryTimer > 0.5) {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title
        const glow = 0.7 + 0.3 * Math.sin(time * 2);
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 25 * glow;
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${Math.min(W * 0.06, 50)}px 'Courier New', monospace`;
        ctx.fillText('VOYAGER COMPLETE', W / 2, H * 0.25);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#CCDDAA';
        ctx.font = `${Math.min(W * 0.025, 18)}px 'Courier New', monospace`;
        ctx.fillText('All planets discovered — mission accomplished!', W / 2, H * 0.34);
    }

    if (victoryTimer > 1.5) {
        ctx.font = `${Math.min(W * 0.022, 16)}px 'Courier New', monospace`;
        ctx.textAlign = 'center';

        // Stats
        const totalRes = planets.reduce((sum, p) => sum + (p.resources ? p.resources.length : 0), 0);
        const collectedRes = planets.reduce((sum, p) => sum + (p.resources ? p.resources.filter(r => r.collected).length : 0), 0);
        const landedCount = planets.filter(p => p.landed).length;

        const stats = [
            { label: 'Planets Discovered', value: planets.length + ' / ' + planets.length, color: '#66DD88' },
            { label: 'Planets Landed On', value: landedCount + ' / ' + planets.filter(p => !p.isGas).length, color: '#66BBDD' },
            { label: 'Resources Collected', value: collectedRes + ' / ' + totalRes, color: '#DDBB66' },
            { label: 'Minerals Gathered', value: '' + ship.minerals, color: '#BB88FF' },
            { label: 'Fuel Remaining', value: ship.fuel.toFixed(0) + '%', color: '#66DD66' },
        ];

        let y = H * 0.44;
        for (const s of stats) {
            const a = clamp((victoryTimer - 1.5) * 2 - (y - H * 0.44) / 100, 0, 1);
            if (a <= 0) continue;
            ctx.globalAlpha = a;
            ctx.fillStyle = '#8899AA';
            ctx.fillText(s.label, W / 2 - 100, y);
            ctx.fillStyle = s.color;
            ctx.textAlign = 'left';
            ctx.fillText(s.value, W / 2 + 60, y);
            ctx.textAlign = 'center';
            y += 30;
        }
        ctx.globalAlpha = 1;
    }

    // Planet list
    if (victoryTimer > 3) {
        ctx.font = `${Math.min(W * 0.018, 13)}px 'Courier New', monospace`;
        let y = H * 0.72;
        ctx.fillStyle = '#667788';
        ctx.fillText('Planets:', W / 2, y - 18);
        const names = planets.map(p => p.name).join('  \u00B7  ');
        ctx.fillStyle = '#99AABB';
        ctx.fillText(names, W / 2, y);
    }

    // Return message
    if (victoryTimer > 5) {
        const blink = Math.sin(time * 2.5) > 0 ? 0.7 : 0.3;
        ctx.fillStyle = `rgba(170,187,204,${blink})`;
        ctx.font = `${Math.min(W * 0.02, 14)}px 'Courier New', monospace`;
        ctx.fillText('Returning to menu...', W / 2, H * 0.88);
    }
}

// ==========================================
//  GAME OVER
// ==========================================
function triggerGameOver(message) {
    gameOverMessage = message;
    gameOverTimer = 0;
    // Explosion particles at ship position
    for (let i = 0; i < 60; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 30 + Math.random() * 200;
        emitParticle(
            ship.x, ship.y,
            Math.cos(a) * spd, Math.sin(a) * spd,
            0.8 + Math.random() * 1.0, 3 + Math.random() * 5,
            255, 80 + Math.random() * 170 | 0, 10 + Math.random() * 40 | 0
        );
    }
    camera.shake = 40;
    playSound(60, 1.5, 'sawtooth', 0.3);
    playSound(40, 2.0, 'square', 0.2);
    playSound(100, 0.8, 'triangle', 0.15);
    gameState = 'GAMEOVER';
}

function updateGameOver(dt) {
    gameOverTimer += dt;
    updateParticles(dt);
    updateCamera(ship.x, ship.y, dt);
    updatePlanets(dt);

    // Press any key after 2 seconds to go back to menu
    if (gameOverTimer > 2 && Object.keys(keysJustPressed).length > 0) {
        systemSeed = Date.now();
        particles.length = 0;
        victoryTriggered = false;
        changeState('TITLE');
    }
}

function renderGameOver(time) {
    // Render the orbit view as background (frozen scene)
    renderOrbit(time);

    // Dark overlay
    const fade = clamp(gameOverTimer * 0.8, 0, 0.7);
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.fillRect(0, 0, W, H);

    // Explosion flash at the start
    if (gameOverTimer < 0.3) {
        const flash = 1 - gameOverTimer / 0.3;
        ctx.fillStyle = `rgba(255,200,100,${flash * 0.4})`;
        ctx.fillRect(0, 0, W, H);
    }

    if (gameOverTimer > 0.8) {
        // Game over text
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.shadowColor = '#FF4400';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#FF6644';
        ctx.font = `bold ${Math.min(W * 0.07, 56)}px 'Courier New', monospace`;
        ctx.fillText('MISSION FAILED', W / 2, H * 0.35);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#CC9988';
        ctx.font = `${Math.min(W * 0.025, 20)}px 'Courier New', monospace`;
        ctx.fillText(gameOverMessage, W / 2, H * 0.45);

        // Stats
        ctx.fillStyle = '#889';
        ctx.font = `${Math.min(W * 0.02, 15)}px 'Courier New', monospace`;
        const discovered = planets.filter(p => p.discovered).length;
        ctx.fillText(`Planets Discovered: ${discovered} / ${planets.length}`, W / 2, H * 0.55);
        ctx.fillText(`Minerals Collected: ${ship.minerals}`, W / 2, H * 0.59);

        // Restart prompt
        if (gameOverTimer > 2 && Math.sin(time * 3) > 0) {
            ctx.fillStyle = '#AABB';
            ctx.fillText('[ Press any key to return to menu ]', W / 2, H * 0.72);
        }
    }
}

// ==========================================
//  DISCOVERY LOG
// ==========================================
function renderDiscoveryLog() {
    // Semi-transparent overlay
    ctx.fillStyle = 'rgba(0,5,15,0.85)';
    ctx.fillRect(W * 0.15, H * 0.1, W * 0.7, H * 0.8);
    ctx.strokeStyle = 'rgba(100,150,200,0.3)';
    ctx.strokeRect(W * 0.15, H * 0.1, W * 0.7, H * 0.8);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#AABBCC';
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillText('DISCOVERY LOG', W / 2, H * 0.17);

    ctx.font = '13px "Courier New", monospace';
    ctx.textAlign = 'left';
    const startX = W * 0.2;
    let y = H * 0.24;

    for (const p of planets) {
        const discovered = p.discovered;
        ctx.fillStyle = discovered ? '#CCDDEE' : '#445566';
        const name = discovered ? p.name : '???';
        const type = discovered ? p.type.name : '???';
        const landed = p.landed ? 'LANDED' : (discovered ? 'Discovered' : 'Unknown');
        const line = `${name.padEnd(14)} ${type.padEnd(10)} ${landed}`;
        ctx.fillText(line, startX, y);

        if (discovered && p.resources.length > 0) {
            const collected = p.resources.filter(r => r.collected).length;
            ctx.fillStyle = '#6688AA';
            ctx.fillText(`  Resources: ${collected}/${p.resources.length}`, startX + 20, y + 18);
            y += 18;
        }

        // Show moons
        if (discovered && p.moons && p.moons.length > 0) {
            for (const m of p.moons) {
                ctx.fillStyle = m.discovered ? '#99BBCC' : '#334455';
                const mName = m.discovered ? m.name : '???';
                ctx.fillText(`    Moon: ${mName}`, startX + 30, y + 18);
                y += 18;
            }
        }

        y += 28;
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#556677';
    ctx.fillText('[ Tab to close ]', W / 2, H * 0.85);
}

// ==========================================
//  TRANSITIONS
// ==========================================
function updateTransition(dt) {
    if (!transition.active) return;
    transition.alpha += dt * 2.5;
    if (transition.alpha >= 1 && transition.callback) {
        transition.callback();
        transition.callback = null;
    }
    if (transition.alpha >= 2) {
        transition.active = false;
        transition.alpha = 0;
    }
}

function renderTransition() {
    if (!transition.active) return;
    const fade = transition.alpha <= 1 ? transition.alpha : 2 - transition.alpha;
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.fillRect(0, 0, W, H);
}

// ==========================================
//  MAIN GAME LOOP
// ==========================================
let lastTime = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    gameTime += dt;

    // Update transition
    updateTransition(dt);

    // Update current state
    switch (gameState) {
        case 'TITLE': updateTitle(dt); break;
        case 'SETTINGS': updateSettings(dt); break;
        case 'ORBIT': updateOrbit(dt); break;
        case 'LANDING': updateLanding(dt); break;
        case 'SURFACE': updateSurface(dt); break;
        case 'LAUNCH': updateLaunch(dt); break;
        case 'GAMEOVER': updateGameOver(dt); break;
        case 'VICTORY': updateVictory(dt); break;
    }

    // Render current state
    switch (gameState) {
        case 'TITLE': renderTitle(gameTime); break;
        case 'SETTINGS': renderSettings(gameTime); break;
        case 'ORBIT': renderOrbit(gameTime); break;
        case 'LANDING': renderLanding(gameTime); break;
        case 'SURFACE': renderSurface(gameTime); break;
        case 'LAUNCH': renderLaunch(gameTime); break;
        case 'GAMEOVER': renderGameOver(gameTime); break;
        case 'VICTORY': renderVictory(gameTime); break;
    }

    // Render transition overlay
    renderTransition();

    // Clear input
    clearJustPressed();

    requestAnimationFrame(gameLoop);
}

// ==========================================
//  INITIALIZATION
// ==========================================
function init() {
    resize();
    systemSeed = Date.now();
    gameState = 'TITLE';
    stateTime = 0;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

// Ensure init runs after the page is ready
if (document.readyState === 'complete' || document.readyState === 'interactive') {
    init();
} else {
    window.addEventListener('DOMContentLoaded', init);
}
</script>
